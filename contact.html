<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<!-- keep Chrome's auto-translate off, same as the app itself -->
<meta name="google" content="notranslate" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#16161d">
<meta name="color-scheme" content="dark">
<link rel="icon" type="image/png" sizes="192x192" href="/icons/192.png">
<title>glyph — contact</title>
<script>
(function () {
  try {
    if (localStorage.getItem("glyph:theme") === "light") {
      document.documentElement.setAttribute("data-theme", "light");
    }
  } catch (e) {}
})();
</script>
<style>
  :root{
    --ink:#16161d; --surface:#1f1f28; --panel:#22222c; --border:#363646;
    --text:#dcd7ba; --muted:#727169;
    --blue:#7e9cd8; --green:#98bb6c; --yellow:#e6c384; --red:#e46876; --mauve:#957fb8;
    color-scheme: dark;
  }
  :root[data-theme="light"]{
    --ink:#f3f0f9; --surface:#ffffff; --panel:#f5f1fa; --border:#e1d9f0;
    --text:#1a1625; --muted:#756f85;
    --blue:#3457d5; --green:#3f9e5c; --yellow:#b8860a; --red:#d1425d; --mauve:#7c3aed;
    color-scheme: light;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:var(--ink);}
  body{
    color:var(--text);
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
    display:flex; align-items:center; justify-content:center;
    min-height:100%; padding:20px;
  }
  .card{width:100%; max-width:380px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:28px 26px; position:relative;}
  .logo{width:40px; height:40px; border-radius:9px; display:block; margin-bottom:14px;}
  .prompt{color:var(--green); font-size:13px; margin-bottom:14px;}
  .prompt .path{color:var(--blue);}
  .prompt .dollar{color:var(--muted);}
  h1{font-size:19px; font-weight:600; margin-bottom:6px;}
  .sub{color:var(--muted); font-size:13px; margin-bottom:6px;}
  label{display:block; font-size:12px; color:var(--muted); margin:14px 0 6px;}
  input[type=text], input[type=email], textarea{
    width:100%; background:var(--panel); border:1px solid var(--border);
    color:var(--text); border-radius:6px; padding:10px 12px;
    font-family:inherit; font-size:14px; outline:none; resize:vertical;
  }
  textarea{min-height:110px;}
  input:focus, textarea:focus{border-color:var(--blue);}
  button{
    width:100%; margin-top:20px; padding:10px 12px;
    background:var(--blue); color:var(--ink); border:none; border-radius:6px;
    font-family:inherit; font-size:14px; font-weight:600; cursor:pointer;
  }
  button:hover{opacity:.9;}
  button:disabled{opacity:.5; cursor:default;}
  .error{
    display:none; margin-top:14px; padding:8px 10px;
    background:color-mix(in srgb, var(--red) 12%, transparent); border:1px solid var(--red);
    color:var(--red); font-size:12.5px; border-radius:6px;
  }
  .error.show{display:block;}
  .sent{display:none; text-align:center;}
  .sent.show{display:block;}
  .sent h1{color:var(--green);}
  .back{margin-top:18px; text-align:center; font-size:12.5px; color:var(--muted);}
  .back a{color:var(--blue); text-decoration:none;}
  .back a:hover{text-decoration:underline;}
  .themebtn{
    position:absolute; top:26px; right:26px; width:30px; height:30px; border-radius:6px;
    display:flex; align-items:center; justify-content:center; color:var(--muted);
    background:var(--panel); border:1px solid var(--border); cursor:pointer;
  }
  .themebtn:hover{color:var(--text);}
</style>
</head>
<body>
  <div class="card">
    <button class="themebtn" id="themeBtn" aria-label="Toggle theme"></button>
    <div id="formView">
      <img class="logo" src="/icons/192.png" alt="glyph">
      <div class="prompt"><span class="path">daksh@glyph</span><span class="dollar">:~$</span> mail --compose</div>
      <h1>get in touch</h1>
      <p class="sub">bug, question, feedback, anything — I read these myself.</p>
      <form id="form">
        <label for="name">name (optional)</label>
        <input type="text" id="name" autocomplete="name">
        <label for="email">email (optional, so I can reply)</label>
        <input type="email" id="email" autocomplete="email">
        <label for="message">message</label>
        <textarea id="message" required></textarea>
        <button type="submit" id="btn">send</button>
      </form>
      <div class="error" id="err"></div>
    </div>
    <div class="sent" id="sentView">
      <h1>sent</h1>
      <p class="sub">thanks — I'll get back to you if you left an email.</p>
    </div>
    <div class="back"><a href="/login">&larr; back to glyph</a></div>
  </div>

<script>
  var SUN = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>';
  var MOON = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5z"/></svg>';
  var themeBtn = document.getElementById("themeBtn");
  function paint() {
    var t = document.documentElement.getAttribute("data-theme") || "dark";
    themeBtn.innerHTML = t === "dark" ? SUN : MOON;
  }
  themeBtn.onclick = function () {
    var next = (document.documentElement.getAttribute("data-theme") || "dark") === "dark" ? "light" : "dark";
    document.documentElement.setAttribute("data-theme", next);
    try { localStorage.setItem("glyph:theme", next); } catch (e) {}
    document.querySelector('meta[name="theme-color"]').setAttribute("content", next === "light" ? "#f3f0f9" : "#16161d");
    document.querySelector('meta[name="color-scheme"]').setAttribute("content", next);
    paint();
  };
  paint();

  var form = document.getElementById("form");
  var err = document.getElementById("err");
  var btn = document.getElementById("btn");
  form.addEventListener("submit", function (e) {
    e.preventDefault();
    err.classList.remove("show");
    var message = document.getElementById("message").value.trim();
    if (!message) { err.textContent = "write something first"; err.classList.add("show"); return; }
    btn.disabled = true; btn.textContent = "sending...";
    fetch("/api/contact", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        message: message,
      }),
    })
      .then(function (res) { return res.json().then(function (data) { return { res: res, data: data }; }); })
      .then(function (r) {
        if (r.res.ok) {
          document.getElementById("formView").style.display = "none";
          document.getElementById("sentView").classList.add("show");
        } else {
          err.textContent = r.data.error || "something went wrong";
          err.classList.add("show");
          btn.disabled = false; btn.textContent = "send";
        }
      })
      .catch(function () {
        err.textContent = "network error";
        err.classList.add("show");
        btn.disabled = false; btn.textContent = "send";
      });
  });
</script>
</body>
</html>
