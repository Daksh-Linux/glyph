<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="glyph" />
<meta name="theme-color" content="#16161d" />
<meta name="color-scheme" content="dark" />
<!-- PWA manifest — tells Chrome/Android how to install glyph as a standalone app -->
<link rel="manifest" href="/manifest.json" />
<!-- iOS home screen icon — Safari uses this when you "Add to Home Screen" -->
<link rel="apple-touch-icon" href="/icons/192.png" />
<link rel="icon" type="image/png" sizes="192x192" href="/icons/192.png" />
<script>
// runs before the page paints so a saved "light" preference doesn't flash dark first
(function () {
  try {
    var t = localStorage.getItem("glyph:theme");
    if (t === "light") {
      document.documentElement.setAttribute("data-theme", "light");
      document.querySelector('meta[name="theme-color"]').setAttribute("content", "#f3f0f9");
      document.querySelector('meta[name="color-scheme"]').setAttribute("content", "light");
    }
  } catch (e) {}
})();
</script>
<title>glyph</title>
<style>
:root{
  --ink:#16161d; --surface:#1f1f28; --panel:#22222c; --line:#34343f; --line2:#2a2a35;
  --text:#dcd7ba; --dim:#7a7a8c; --faint:#4a4a57; --sel-bg:#20283b;
  --blue:#7e9cd8; --green:#98bb6c; --yellow:#e6c384; --red:#e46876; --mauve:#957fb8;
  --mono: ui-monospace,'JetBrains Mono','SFMono-Regular','Cascadia Code',Menlo,Consolas,'Liberation Mono',monospace;
  color-scheme: dark; /* tells Android Chrome this is already a dark theme — prevents forced-dark from mangling our colors */
}
/* light theme — same Hollow Purple palette as dakshhq.com, toggled via the bar button */
:root[data-theme="light"]{
  --ink:#f3f0f9; --surface:#faf9fd; --panel:#efe9f7; --line:#e1d9f0; --line2:#e8e1f5;
  --text:#1a1625; --dim:#756f85; --faint:#b6aec8; --sel-bg:#ece2fb;
  --blue:#3457d5; --green:#3f9e5c; --yellow:#b8860a; --red:#d1425d; --mauve:#7c3aed;
  color-scheme: light;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:var(--surface); color:var(--text);
  font-family:var(--mono); font-size:14px; line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
.app{position:fixed; inset:0; display:flex; flex-direction:column}
.spacer{flex:1}
button{font-family:var(--mono); cursor:pointer; color:inherit; background:none; border:none}
button:focus-visible, textarea:focus-visible{outline:2px solid var(--blue); outline-offset:1px}
svg{display:block}

/* top bar */
/* env(safe-area-inset-top) is the iOS status bar height — adding it as padding pushes our
   buttons below the status bar while the same ink colour fills behind it, making it invisible */
.bar{display:flex; align-items:center; gap:10px;
  height:calc(42px + env(safe-area-inset-top)); padding:env(safe-area-inset-top) 10px 0;
  background:var(--ink); border-bottom:1px solid var(--line); flex:0 0 auto;
  overflow-x:auto; scrollbar-width:none} /* safety net: even if the trims below aren't enough on
  some device, the bar scrolls instead of silently clipping icons past the screen edge */
.bar::-webkit-scrollbar{display:none}
.brandmark{width:18px; height:18px; border-radius:4px; flex:0 0 auto; display:block}
.prompt{white-space:nowrap; display:flex; align-items:center; gap:8px; flex-shrink:0}
.user{color:var(--green)} .path{color:var(--blue)} .sig{color:var(--mauve)}
.file{opacity:.85; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:34vw}
.bar .tab{font-size:13px; padding:5px 10px; border:1px solid var(--line); border-radius:5px; color:var(--dim); white-space:nowrap; flex-shrink:0}
.bar .tab .key{color:var(--mauve)}
.bar .tab.on{color:var(--text); border-color:var(--blue); background:var(--sel-bg)}
.bar .tab.on .key{color:var(--blue)}
.iconbtn{display:flex; align-items:center; justify-content:center; width:30px; height:30px; border-radius:5px; color:var(--dim); flex-shrink:0}
.iconbtn:hover{color:var(--text); background:var(--panel)}
.only-mobile{display:none}
/* a real (readonly) input, not a button — grows into the gap between the two spacers around it
   up to max-width on desktop, shrinks down toward just the icon on a narrow phone since nothing
   here has flex-shrink:0 the way .iconbtn does */
.searchbar{display:flex; align-items:center; gap:6px; background:var(--panel); border:1px solid var(--line);
  border-radius:15px; padding:0 10px; height:28px; color:var(--dim); flex:1 1 auto; min-width:30px; max-width:340px; cursor:pointer}
.searchbar:hover, .searchbar:focus-within, .searchbar:focus{border-color:var(--blue); color:var(--text)}
.searchbar svg{flex:0 0 auto}
.searchbar input{flex:1; min-width:0; width:100%; background:none; border:none; outline:none; color:var(--text);
  font-family:var(--mono); font-size:12.5px; cursor:pointer; text-overflow:ellipsis}
.searchbar input::placeholder{color:var(--dim)}

/* body */
.body{flex:1; display:flex; min-height:0; position:relative}

/* sidebar */
.side{width:236px; flex:0 0 auto; background:var(--ink);
  border-right:1px solid var(--line); display:flex; flex-direction:column; min-height:0}
.side-head{display:flex; align-items:center; justify-content:space-between;
  padding:10px 12px 8px; color:var(--dim); font-size:12px; letter-spacing:.5px;
  border-bottom:1px solid var(--line2)}
.list{list-style:none; margin:0; padding:8px; overflow-y:auto; flex:1; display:flex; flex-direction:column; gap:2px}
.row{display:flex; align-items:center; gap:7px; padding:7px 8px; border-radius:9px; color:var(--text);
  cursor:pointer; border:1px solid transparent}
.row:hover{background:var(--panel); border-color:var(--line2)}
.row.sel{background:var(--sel-bg); border-color:var(--blue)}
.tree-tog{color:var(--dim); font-size:11px; padding:0; line-height:1; flex:0 0 12px; text-align:center; width:12px}
.tree-tog:hover{color:var(--blue)}
.tree-leaf{width:12px; flex:0 0 12px}
.row .name{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.row.sel .name{color:var(--text)}
.row .ink{color:var(--yellow); font-size:11px; flex:0 0 auto}
.addchild{opacity:0; color:var(--dim); font-size:13px; padding:1px 5px; border-radius:6px; line-height:1; flex:0 0 auto}
.row:hover .addchild{opacity:.6}
.addchild:hover{opacity:1!important; color:var(--green)}
.row .del{opacity:0; color:var(--dim); display:flex; padding:2px; border-radius:6px; flex:0 0 auto}
.row:hover .del{opacity:.7}
.row .del:hover{opacity:1!important; color:var(--red)}
.empty-folder{padding:22px 14px; text-align:center; color:var(--dim); font-size:12.5px; line-height:1.7; list-style:none}
.newrow{padding:9px 12px; text-align:left; width:100%; color:var(--dim); border-top:1px solid var(--line2)}
.newrow:hover{color:var(--green)}
.newrow.danger{font-size:11px; color:var(--faint); border-top:none}
.newrow.danger:hover{color:var(--red)}
.newrow.sub{font-size:11px; text-decoration:none; display:block; border-top:none; color:var(--faint)}
.newrow.sub:hover{color:var(--green)}
.scrim{display:none}
[hidden]{display:none!important} /* author CSS can override UA [hidden]; this prevents that */

/* account-deletion confirmation modal */
.modal-scrim{position:fixed; inset:0; z-index:40; background:rgba(0,0,0,.5); display:flex; align-items:center; justify-content:center; padding:20px}
.modal{width:100%; max-width:340px; background:var(--surface); border:1px solid var(--line); border-radius:8px; padding:22px}
.modal h2{font-size:15px; margin:0 0 10px; color:var(--red); font-weight:600}
.modal p{font-size:13px; color:var(--dim); line-height:1.5; margin:0 0 14px}
.modal input[type=password]{width:100%; background:var(--panel); border:1px solid var(--line); color:var(--text); border-radius:6px; padding:9px 10px; font-family:var(--mono); font-size:13px; outline:none; box-sizing:border-box}
.modal input[type=password]:focus{border-color:var(--blue)}
.modal .row2{display:flex; gap:8px; margin-top:16px}
.modal .row2 button{flex:1; padding:9px; border-radius:6px; font-size:13px; border:1px solid var(--line); color:var(--text)}
.modal .danger-btn{background:var(--red); border-color:var(--red); color:var(--ink); font-weight:600}
.modal .danger-btn:disabled{opacity:.5}
.modal .err{color:var(--red); font-size:12px; margin-top:8px; display:none}
.modal .err.show{display:block}

/* command palette — a dropdown anchored under the search bar (position set in JS from
   #searchBar's actual on-screen rect, since it's not in a positioning context of its own),
   not a centered modal. #searchBarInput itself is the live typable field. */
.palette-dropdown{position:fixed; z-index:45; background:var(--surface); border:1px solid var(--line);
  border-radius:10px; box-shadow:0 12px 32px rgba(0,0,0,.45); overflow:hidden}
.palette-section{padding:8px 12px 4px; font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--faint)}
.palette-section-toggle{cursor:pointer; border-radius:4px}
.palette-section-toggle:hover{color:var(--text); background:var(--panel)}
.palette-list{list-style:none; margin:0; padding:6px; max-height:min(60vh,420px); overflow-y:auto}
.palette-list li{padding:8px 10px; border-radius:5px; color:var(--text); cursor:pointer; display:flex; align-items:center; gap:8px; font-size:13.5px; scroll-margin:6px}
.palette-list li .kind{color:var(--dim); font-size:11px; flex:0 0 auto}
.palette-list li.sel{background:var(--sel-bg)}
.palette-list li:hover{background:var(--panel)}
.palette-empty{padding:14px 16px; color:var(--dim); font-size:13px}

/* [[ ]] link autocomplete */
.wiki-popup{position:absolute; left:16px; bottom:16px; z-index:15; width:240px; max-height:220px; overflow-y:auto;
  background:var(--surface); border:1px solid var(--line); border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,.35); padding:5px}
.wiki-popup li{list-style:none; padding:7px 9px; border-radius:5px; font-size:13px; color:var(--text); cursor:pointer}
.wiki-popup li.sel{background:var(--sel-bg)}
.wiki-popup li:hover{background:var(--panel)}

/* backlinks panel */
.backlinks{flex:0 0 auto; border-top:1px solid var(--line2); background:var(--ink)}
.backlinks-head{display:flex; align-items:center; gap:6px; padding:8px 14px; color:var(--dim); font-size:11.5px; cursor:pointer; user-select:none}
.backlinks-head .tri{font-size:9px; transition:transform .15s ease}
.backlinks.collapsed .tri{transform:rotate(-90deg)}
.backlinks.collapsed .backlinks-list{display:none}
.backlinks-list{list-style:none; margin:0; padding:0 14px 10px; display:flex; flex-wrap:wrap; gap:6px}
.backlinks-list li{background:var(--panel); border:1px solid var(--line); border-radius:5px; padding:4px 9px; font-size:12px; color:var(--blue); cursor:pointer}
.backlinks-list li:hover{border-color:var(--blue)}

/* main */
.main{flex:1; min-width:0; display:flex; flex-direction:column; position:relative}
.editor{flex:1; width:100%; resize:none; border:none; outline:none; box-shadow:none; padding:22px clamp(16px,5vw,64px);
  background:var(--surface); color:var(--text); font-family:var(--mono);
  font-size:16px; line-height:1.7; tab-size:2; box-sizing:border-box;
  user-select:text; -webkit-user-select:text;
  -webkit-tap-highlight-color:transparent; -webkit-appearance:none; appearance:none;}
.editor:focus{outline:none; box-shadow:none; border:none;}
.localfile-bar{display:flex; align-items:center; gap:10px; padding:8px 14px; flex:0 0 auto;
  background:var(--ink); border-bottom:1px solid var(--line2); font-size:12.5px;}
.localfile-name{color:var(--dim);}
.localfile-hint{color:var(--faint); font-size:11.5px; white-space:nowrap;}
.localfile-bar .ghost.sm{padding:4px 10px; font-size:12px;}
.editor::placeholder{color:var(--faint)}
.empty{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; color:var(--dim)}

/* block editor (Phase 2) — on by default; localStorage["glyph:blockEditor"] = "0" opts back out */
/* the note area is now one shared surface: .note-scroll scrolls, .note-surface holds the text
   layer (#blockEditor) AND the ink canvases stacked on top of each other. Text and drawing live
   on the same canvas — draw mode just changes which layer receives input, nothing is rebuilt. */
.note-scroll{flex:1; overflow-y:auto; overflow-x:hidden; position:relative; min-height:0}
.note-surface{position:relative; min-height:100%}
/* ink canvases cover the whole surface; pointer-events:none means in text mode every tap falls
   straight through to the text underneath — the ink is just visible on top */
.ink{position:absolute; top:0; left:0; pointer-events:none; z-index:5}
/* draw mode: the scroller stops native touch scrolling (JS handles it, so the pen never scrolls)
   and the text layer stops receiving taps so a pen stroke can't focus a block mid-drawing */
.note-scroll.draw-on{touch-action:none; -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; cursor:crosshair}
/* same dot-grid paper the old draw screen had — appears only while drawing */
.draw-on .note-surface{background:radial-gradient(circle at 1px 1px, var(--line2) 1px, transparent 0) 0 0/22px 22px}
.draw-on #blockEditor{pointer-events:none; user-select:none; -webkit-user-select:none}
/* 45vh bottom padding = the "empty space" below the last block is real, tappable writing room */
#blockEditor{width:100%; position:relative; z-index:1; padding:22px clamp(16px,5vw,64px) 45vh;
  color:var(--text); font-family:var(--mono); font-size:16px; line-height:1.7; box-sizing:border-box;}

/* keyboard bar — the Notion-style formatting toolbar. Sits above the status bar in normal flow;
   when the on-screen keyboard opens (iPad/Android) it floats up to sit right on top of it
   (see positionKbar(), driven by the visualViewport API) */
.kbar{display:flex; align-items:center; gap:2px; padding:4px 6px; flex:0 0 auto;
  background:var(--ink); border-top:1px solid var(--line); overflow-x:auto; scrollbar-width:none;
  padding-bottom:calc(4px + env(safe-area-inset-bottom))}
.kbar::-webkit-scrollbar{display:none}
.kbar button{flex:0 0 auto; min-width:34px; height:32px; padding:0 8px; border-radius:6px;
  color:var(--dim); font-size:13px; display:flex; align-items:center; justify-content:center; white-space:nowrap}
.kbar button:hover{color:var(--text); background:var(--panel)}
.kbar button:active{color:var(--text); background:var(--sel-bg)}
.kbar .kdiv{flex:0 0 1px; height:20px; background:var(--line2); margin:0 4px}
.kbar.floating{position:fixed; left:0; right:0; bottom:0; z-index:30}

/* inline rendering extras */
.inline-code{background:var(--panel); border:1px solid var(--line); border-radius:4px; padding:0 5px; font-size:.9em}
.block mark, .cell-text mark{background:var(--yellow); color:var(--ink); padding:0 3px; border-radius:3px}
.md-link{color:var(--green); text-decoration:underline; cursor:pointer}
.md-link:hover{color:var(--blue)}

/* keyboard-shortcuts help modal */
.modal.wide{max-width:440px; max-height:80vh; overflow-y:auto}
.sc-row{display:flex; justify-content:space-between; gap:14px; font-size:12.5px; padding:4px 0; border-bottom:1px solid var(--line2)}
.sc-row span{color:var(--dim)}
.sc-row kbd{font-family:var(--mono); color:var(--blue); background:var(--panel); border:1px solid var(--line); border-radius:4px; padding:1px 6px; font-size:11.5px; white-space:nowrap}
.block{outline:none; padding:2px 0; min-height:1.3em; word-break:break-word; white-space:pre-wrap;}
.block:empty::before{content:attr(data-placeholder); color:var(--faint); pointer-events:none;}
.block-h1{font-size:1.5em; font-weight:700; margin-top:.3em;}
.block-h2{font-size:1.25em; font-weight:700; margin-top:.3em;}
.block-h3{font-size:1.1em; font-weight:700; margin-top:.3em;}
.block-ul, .block-ol{display:flex; gap:8px;}
.block-ul .marker, .block-ol .marker{color:var(--dim); flex:0 0 auto; user-select:none;}
.block-ul .block-text, .block-ol .block-text{flex:1; min-width:0;}
.block-todo{display:flex; gap:8px; align-items:flex-start;}
.block-todo input{margin-top:6px; flex:0 0 auto; width:15px; height:15px; accent-color:var(--blue);}
.block-todo .block-text{flex:1; min-width:0;}
.block-todo .block-text.checked{color:var(--dim); text-decoration:line-through;}
.block-quote{border-left:3px solid var(--mauve); padding-left:12px; color:var(--dim); font-style:italic;}
.wiki-link-rendered{color:var(--blue); text-decoration:underline; text-decoration-style:dotted; cursor:pointer;}
.wiki-link-rendered:hover{color:var(--mauve);}
.block-code-wrap{margin:4px 0;}
.block-code-ta{display:block; width:100%; background:var(--panel); border:1px solid var(--line); border-radius:6px;
  color:var(--text); font-family:var(--mono); font-size:14px; line-height:1.5; padding:10px 12px; resize:vertical;
  box-sizing:border-box; min-height:2.6em;}
.block-hr{border:none; border-top:1px solid var(--line); margin:14px 0; cursor:pointer;}
.block-hr:hover{border-top-color:var(--red);}
.block-toggle{margin:4px 0; border:1px solid var(--line); border-radius:6px; padding:2px 10px;}
.block-toggle summary{padding:8px 2px; cursor:pointer; list-style:revert; color:var(--text); display:flex; align-items:center; gap:8px;}
.block-toggle summary::marker{color:var(--dim);}
.toggle-summary-text{outline:none; display:inline; flex:1; min-width:0;}
.toggle-rm{flex:0 0 auto; width:18px; height:18px; border:none; background:none; color:var(--dim); font-size:14px;
  cursor:pointer; border-radius:3px; opacity:0;}
.block-toggle:hover .toggle-rm{opacity:1;}
.toggle-rm:hover{color:var(--red); background:var(--panel);}
.toggle-summary-text:empty::before{content:attr(data-placeholder); color:var(--faint);}
.block-toggle-body{display:block; width:100%; background:none; border:none; border-top:1px solid var(--line2);
  color:var(--text); font-family:var(--mono); font-size:15px; line-height:1.6; padding:8px 2px 10px; resize:vertical;
  box-sizing:border-box; min-height:2.4em; outline:none;}
.block-table-wrap{margin:6px 0;}
.block-table{border-collapse:collapse; width:100%; font-size:14.5px;}
.block-table td, .block-table th{border:1px solid var(--line); padding:0; text-align:left; position:relative;}
.block-table th{background:var(--panel); font-weight:600;}
.block-table .cell-text{padding:6px 9px; outline:none; min-width:40px;}
.block-table th.table-add{padding:6px 9px; text-align:center; color:var(--dim); cursor:pointer; width:28px; border-style:dashed;}
.block-table th.table-add:hover{color:var(--green); border-color:var(--green);}
.block-table td.table-handle, .block-table th.table-handle{border:none; width:18px; padding:0;}
.table-rm-col{position:absolute; top:1px; right:1px; width:15px; height:15px; line-height:15px; padding:0;
  border:none; background:none; color:var(--dim); font-size:12px; cursor:pointer; opacity:0; border-radius:3px;}
.block-table th:hover .table-rm-col{opacity:1;}
.table-rm-col:hover{color:var(--red); background:var(--ink);}
.table-rm-row{width:16px; height:16px; line-height:14px; padding:0; border:1px solid transparent; border-radius:3px;
  background:none; color:var(--dim); font-size:12px; cursor:pointer; opacity:0;}
.block-table tr:hover .table-rm-row{opacity:1;}
.table-rm-row:hover{color:var(--red); border-color:var(--red);}
.table-foot{display:flex; gap:8px; margin-top:4px;}
.table-add-row{font-size:12px; color:var(--dim); background:none; border:1px dashed var(--line);
  border-radius:5px; padding:4px 10px; cursor:pointer;}
.table-add-row:hover{color:var(--green); border-color:var(--green);}
.table-rm-all{font-size:12px; color:var(--dim); background:none; border:1px dashed var(--line);
  border-radius:5px; padding:4px 10px; cursor:pointer;}
.table-rm-all:hover{color:var(--red); border-color:var(--red);}

/* draw */
.drawwrap{flex:1; display:flex; flex-direction:column; min-height:0}
.drawbar{display:flex; align-items:center; gap:10px; padding:8px 12px; flex-wrap:wrap;
  background:var(--ink); border-bottom:1px solid var(--line2)}
.swatches{display:flex; gap:6px}
.sw{width:20px; height:20px; border-radius:50%; border:2px solid transparent; padding:0}
.sw.on{border-color:var(--text); box-shadow:0 0 0 2px var(--surface) inset}
.sizes{display:flex; gap:4px}
.szbtn{font-size:12px; padding:4px 8px; border-radius:5px; color:var(--dim); border:1px solid var(--line)}
.szbtn.on{color:var(--text); border-color:var(--blue); background:var(--sel-bg)}
.toggle{font-size:12px; padding:4px 9px; border-radius:5px; border:1px solid var(--line); color:var(--dim)}
.toggle.on{color:var(--ink); background:var(--green); border-color:var(--green)}
/* canvas-scroll scrolls vertically only — touch-action:none so a palm landing near the canvas's
   edge (not exactly on it) can't trigger the browser's own native scroll, which used to fight
   with the manual JS scroll below and feel like the page randomly jumping around while writing */
/* -webkit-touch-callout/user-select: a sustained still touch (a finger resting on the glass while
   holding the pencil, not moving) is a long-press to iOS regardless of touch-action — without this
   it pops the native Copy/Share/Look Up/etc. menu and highlights the canvas as "selected" */
.canvas-scroll{flex:1; overflow-x:hidden; overflow-y:auto; touch-action:none;
  -webkit-touch-callout:none; -webkit-user-select:none; user-select:none;}
/* canvas-wrap holds two stacked canvases — base (committed strokes) and live (current stroke only) */
.canvas-wrap{position:relative;}
.canvas{display:block; touch-action:none; cursor:crosshair;
  background:radial-gradient(circle at 1px 1px, var(--line2) 1px, transparent 0) 0 0/22px 22px, var(--surface)}
/* live canvas sits on top of base, intercepts no pointer events — JS handles those on the base */
.cv-live{position:absolute; top:0; left:0; pointer-events:none;}
.ghost{padding:7px 14px; border:1px solid var(--line); border-radius:6px; color:var(--text)}
.ghost:hover{border-color:var(--blue); background:var(--sel-bg)}
.ghost.sm{padding:4px 10px; font-size:12px}

/* statusline */
.status{display:flex; align-items:center; height:28px; flex:0 0 auto;
  background:var(--ink); border-top:1px solid var(--line); font-size:12px}
.mode{padding:0 12px; height:100%; display:flex; align-items:center; font-weight:600; letter-spacing:1px; color:var(--ink)}
.m-normal{background:var(--blue)} .m-insert{background:var(--green)} .m-draw{background:var(--yellow)}
.seg{padding:0 12px; display:flex; align-items:center; gap:6px; border-right:1px solid var(--line2)}
.seg.fname{color:var(--text)} .seg.dim{color:var(--dim)}
.seg.sync{border-right:none; border-left:1px solid var(--line2)}
.led{width:7px; height:7px; border-radius:50%; display:inline-block}
.led-g{background:var(--green)} .led-y{background:var(--yellow); animation:pulse 1s infinite} .led-r{background:var(--red)}
.cursor{padding:0 10px; color:var(--blue); animation:blink 1.05s steps(1) infinite}

@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

@media (max-width:760px){
  .only-mobile{display:flex}
  .file{display:none}
  .hide-sm{display:none}
  .side{position:absolute; z-index:20; top:0; bottom:0; left:0; width:80%; max-width:300px;
    transform:translateX(-102%); transition:transform .18s ease; box-shadow:2px 0 24px rgba(0,0,0,.5)}
  .side.open{transform:translateX(0)}
  .scrim{display:block; position:absolute; inset:0; z-index:10; background:rgba(0,0,0,.45)}
  .bar .tab{padding:5px 9px}
  /* the biggest space hogs on a narrow phone: "~/notes ❯" is decorative and the tab buttons'
     full "nsert"/"raw" words aren't needed next to the key letter that's already shown — trimming
     both is what actually keeps the icon row (new/search/theme/logout) on-screen without scrolling */
  .prompt .path, .prompt .sig, .bar .tabword{display:none}
  .bar{gap:3px; padding-left:8px; padding-right:8px}
  .iconbtn{width:26px; height:26px}
}
/* longer usernames (kriyansi/bhavesh) need a bit more room back — only the very narrowest
   phones (iPhone SE and similar, ≤380px) still need this on top of the trims above */
@media (max-width:380px){
  .prompt .user{font-size:12px}
}
@media (prefers-reduced-motion:reduce){
  .cursor,.led-y{animation:none}
  .side{transition:none}
}
</style>
</head>
<body>
<div class="app">
  <header class="bar" id="bar"></header>
  <div class="body">
    <aside class="side" id="side"></aside>
    <div class="scrim" id="scrim" hidden></div>
    <div class="modal-scrim" id="modalScrim" hidden></div>
    <main class="main" id="main"></main>
  </div>
  <div class="palette-dropdown" id="paletteDropdown" hidden></div>
  <footer class="status" id="status"></footer>
  <!-- fallback for openLocalFile() on Safari/Firefox, which don't implement the File System
       Access API (showOpenFilePicker) — a plain file input works in every browser -->
  <input type="file" id="lfInput" hidden
    accept=".py,.sh,.js,.ts,.json,.md,.txt,.yml,.yaml,.toml,.c,.cpp,.h,.go,.rs,.html,.css,.rb,.java,text/plain">
</div>

<script>
"use strict";
const $ = (s) => document.querySelector(s);
const uid = () => Math.random().toString(36).slice(2, 9);
const esc = (s) => (s || "").replace(/[&<>"']/g, (c) =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

const PENS = [
  { name: "paper", c: "#dcd7ba" }, { name: "wave", c: "#7e9cd8" },
  { name: "spring", c: "#98bb6c" }, { name: "carp", c: "#e6c384" },
  { name: "peony", c: "#e46876" }, { name: "wisteria", c: "#957fb8" },
];
const SIZES = [{ l: "fine", v: 2 }, { l: "med", v: 3.5 }, { l: "bold", v: 6 }];
// eraser gets its own bigger sizes — small/med/large map to 10/22/44 pixels
const ERASER_SIZES = [{ l: "sm", v: 10 }, { l: "md", v: 22 }, { l: "lg", v: 44 }];

const ICONS = {
  menu: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>',
  plus: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
  trash: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>',
  x: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>',
  logout: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>',
  sun: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>',
  moon: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5z"/></svg>',
  search: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>',
};

/* ---- theme (light / dark) ---- */
// stored plainly (not ME-namespaced) so it applies before login and is shared across accounts on this device
function applyTheme(t) {
  document.documentElement.setAttribute("data-theme", t);
  try { localStorage.setItem("glyph:theme", t); } catch (e) {}
  const mc = document.querySelector('meta[name="theme-color"]');
  if (mc) mc.setAttribute("content", t === "light" ? "#f3f0f9" : "#16161d");
  const cs = document.querySelector('meta[name="color-scheme"]');
  if (cs) cs.setAttribute("content", t);
}
function currentTheme() { return document.documentElement.getAttribute("data-theme") || "dark"; }

/* ---- state ---- */
let notes = [];        // [{id,title,updated,hasInk,parent}]
let activeId = null;
let backlinksData = []; // [{id,title}] — notes that [[link]] to the currently open note
let backlinksCollapsed = false;
let expanded = new Set(); // note IDs whose children are shown inline (indented underneath) in the sidebar
let active = null;     // full note {id,title,body,strokes,updated}
let mode = "normal";   // normal | insert | draw
// pen-only defaults to true (not false) — palm-rejection needs to be active from the very first
// touch in the session, before the pencil has ever touched the glass, otherwise a palm set down
// before the pencil arrives draws/scrolls/clicks like any other touch. Persisted per device like theme.
let penIdx = 1, sizeIdx = 1, eraserSizeIdx = 1, penOnly = readPenOnly(), penSeen = false, erasing = false; // erasing = are we in eraser mode right now
function readPenOnly() { try { return localStorage.getItem("glyph:penOnly") !== "0"; } catch (e) { return true; } }
function setPenOnly(v) { penOnly = v; try { localStorage.setItem("glyph:penOnly", v ? "1" : "0"); } catch (e) {} }
let saveStatus = "saved";
let saveTimer = null;
let ME = "";           // logged-in username, fetched from /api/me at boot
let lastTyped = 0; // timestamp of last local keystroke — used to avoid clobbering in-progress typing during sync
let markerOn = false;  // highlighter mode — translucent, wide strokes (like a real marker over text)
let strokeRedo = [];   // strokes popped by undo, waiting for redo — cleared on new stroke / note switch
let curBlockId = null; // block that last had focus — what the keyboard-bar buttons act on

/* ---- text undo/redo ----
   contenteditable's native undo breaks the moment we re-render blocks (the browser's undo
   entries point at DOM nodes that no longer exist), so glyph keeps its own history: a stack
   of whole-body snapshots. Cheap because notes are just strings, and it survives every
   structural edit (split/merge/move/convert) that native undo chokes on. */
let undoStack = [], redoStack = [], lastSnapAt = 0;

// called with the body as it was BEFORE an edit. Edits within 700ms of each other get grouped
// into one undo step (so undo jumps back a burst of typing, not one letter at a time).
function pushUndo(prevBody) {
  const now = Date.now();
  redoStack.length = 0; // any new edit invalidates the redo branch
  if (undoStack.length && now - lastSnapAt < 700) { lastSnapAt = now; return; }
  if (undoStack[undoStack.length - 1] === prevBody) { lastSnapAt = now; return; }
  undoStack.push(prevBody);
  if (undoStack.length > 200) undoStack.shift();
  lastSnapAt = now;
}

function resetHistory() { undoStack = []; redoStack = []; strokeRedo = []; lastSnapAt = 0; }

function doUndo() {
  if (!active || !undoStack.length) return;
  redoStack.push(active.body);
  active.body = undoStack.pop();
  lastSnapAt = 0; // next edit after an undo always starts a fresh undo step
  lastTyped = Date.now();
  scheduleSave();
  refreshEditorFromBody();
}

function doRedo() {
  if (!active || !redoStack.length) return;
  undoStack.push(active.body);
  active.body = redoStack.pop();
  lastSnapAt = 0;
  lastTyped = Date.now();
  scheduleSave();
  refreshEditorFromBody();
}

// repaint whichever editor is showing after undo/redo replaced active.body wholesale
function refreshEditorFromBody() {
  if ($("#blockEditor")) { blocks = parseBlocks(active.body); renderEditorBlocks(); scheduleInkResize(); }
  else { const ed = $("#ed"); if (ed) ed.value = active.body; }
  renderStatus();
}

/* in-progress drawing */
let drawing = false, cur = null;
let fingerY = null;       // tracks finger Y for manual scroll
let scrollVel = 0;        // momentum velocity in pixels — decays after finger lifts
let scrollEl = null;      // the .canvas-scroll element we're scrolling
let scrollRaf = null;     // requestAnimationFrame id for the momentum loop
let liveRaf = null;       // pending rAF for live canvas draw — ensures max one draw per display frame

/* ---- local cache (offline support) ---- */
let online = true;

const LC = {
  get: (k) => { try { const s = localStorage.getItem(k); return s ? JSON.parse(s) : null; } catch(e) { return null; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} },
  del: (k) => { try { localStorage.removeItem(k); } catch(e) {} }
};

// keys are namespaced by ME (the logged-in username) so two different
// accounts logging into the same browser never see each other's cache
function lcSaveNote(note) { LC.set("glyph:" + ME + ":n:" + note.id, note); }
function lcLoadNote(id) { return LC.get("glyph:" + ME + ":n:" + id); }
function lcSaveList(arr) { LC.set("glyph:" + ME + ":list", arr.map(n => ({ id:n.id, title:n.title, updated:n.updated, parent:n.parent||null }))); }
function lcLoadList() { return LC.get("glyph:" + ME + ":list") || []; }

function lcPending() { return new Set(LC.get("glyph:" + ME + ":pending") || []); }
function lcMarkPending(id) { const p = lcPending(); p.add(id); LC.set("glyph:" + ME + ":pending", [...p]); }
function lcClearPending(id) { const p = lcPending(); p.delete(id); LC.set("glyph:" + ME + ":pending", [...p]); }

function setOnline(val) {
  if (online === val) return;
  online = val;
  renderStatus();
  if (online) syncPending(); // server just came back — flush local changes
}

async function syncPending() {
  const ids = lcPending();
  for (const id of ids) {
    const note = lcLoadNote(id);
    if (!note) { lcClearPending(id); continue; }
    try {
      const saved = await api("PUT", "/api/notes/" + encodeURIComponent(id),
        { title: note.title, body: note.body, strokes: note.strokes || [], parent: note.parent || null });
      lcSaveNote({ ...note, updated: saved.updated });
      lcClearPending(id);
      if (active && active.id === id) { active.updated = saved.updated; }
    } catch(e) { break; } // still offline — stop trying
  }
  if (lcPending().size === 0) { saveStatus = "saved"; renderStatus(); loadList(); }
}

/* ---- api ---- */
async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body !== undefined) { opts.headers["Content-Type"] = "application/json"; opts.body = JSON.stringify(body); }
  const res = await fetch(path, opts);
  if (!res.ok) throw new Error("HTTP " + res.status);
  return res.status === 204 ? null : res.json();
}

async function loadList() {
  try {
    notes = await api("GET", "/api/notes");
    lcSaveList(notes);
    setOnline(true);
    renderList();
  } catch(e) {
    setOnline(false);
    // load from cache so sidebar stays populated
    const cached = lcLoadList();
    if (cached.length && !notes.length) { notes = cached; renderList(); }
  }
}

async function openNote(id) {
  if (!discardLocalFileIfNeeded()) return;
  // blur whatever's focused in the CURRENT note before switching away from it. Without this, the
  // blur fires later instead — synchronously inside renderMain()'s main.innerHTML replacement,
  // by which point `active` already points at the NEW note while the block's blur handler
  // (maybeUpdateTitleFromFirstBlock) still reads the OLD note's blocks[0] and writes the result
  // onto active.title — silently renaming (and saving!) the new note with the old note's content.
  // Blurring here instead lets that handler run while active/blocks still consistently belong to
  // the note being left, which is the correct, harmless case (same as any normal blur).
  const blockHost = $("#blockEditor");
  if (blockHost && blockHost.contains(document.activeElement)) document.activeElement.blur();
  try {
    active = await api("GET", "/api/notes/" + encodeURIComponent(id));
    active.strokes = active.strokes || [];
    lcSaveNote(active); // keep cache fresh
    setOnline(true);
  } catch(e) {
    // server down — load from local cache
    const cached = lcLoadNote(id);
    if (!cached) throw e; // nothing cached, can't open
    active = { ...cached, strokes: cached.strokes || [] };
    setOnline(false);
  }
  activeId = active.id;
  if (mode === "draw") mode = "normal";
  backlinksData = [];
  resetHistory(); // undo history is per-note — never undo note A's edits into note B
  LC.set("glyph:" + ME + ":last", active.id); // remembered across reloads (see boot)
  renderMain(); renderBar(); renderList(); renderStatus();
  loadBacklinks(active.id);
}

async function loadBacklinks(id) {
  try {
    const result = await api("GET", "/api/notes/" + encodeURIComponent(id) + "/backlinks");
    if (activeId !== id) return; // note switched again before this resolved
    backlinksData = result || [];
    renderBacklinksPanel();
  } catch (e) { /* offline or server error — panel just stays empty, not worth surfacing */ }
}

function renderBacklinksPanel() {
  const el = $("#backlinksPanel");
  if (!el) return;
  if (!backlinksData.length) { el.hidden = true; return; }
  el.hidden = false;
  el.classList.toggle("collapsed", backlinksCollapsed);
  el.innerHTML =
    '<div class="backlinks-head" id="backlinksHead"><span class="tri">▾</span>' +
      backlinksData.length + (backlinksData.length === 1 ? " note links here" : " notes link here") +
    "</div>" +
    '<ul class="backlinks-list">' +
      backlinksData.map((n) => '<li data-id="' + esc(n.id) + '">' + esc(n.title) + "</li>").join("") +
    "</ul>";
  $("#backlinksHead").onclick = () => { backlinksCollapsed = !backlinksCollapsed; renderBacklinksPanel(); };
  el.querySelectorAll(".backlinks-list li").forEach((li) => {
    li.onclick = () => openNote(li.getAttribute("data-id"));
  });
}

function scheduleSave() {
  if (!active) return;
  // write to local cache immediately — data is never lost even if server is down
  lcSaveNote(active);
  lcMarkPending(active.id);
  saveStatus = "saving"; renderStatus();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveNow, 650);
}

// the actual PUT — normally fired by scheduleSave's debounce timer, but Cmd/Ctrl-S
// calls it directly to flush the pending save right now instead of waiting 650ms
async function saveNow() {
  if (!active) return;
  clearTimeout(saveTimer);
  try {
    const saved = await api("PUT", "/api/notes/" + encodeURIComponent(active.id),
      { title: active.title, body: active.body, strokes: active.strokes || [], parent: active.parent || null });
    active.id = saved.id; activeId = saved.id; active.title = saved.title; active.updated = saved.updated;
    lcSaveNote(active); lcClearPending(active.id);
    saveStatus = "saved"; setOnline(true); renderStatus(); renderBar();
    loadList();
  } catch(e) {
    setOnline(false);
    saveStatus = "offline"; renderStatus(); // show as offline, not error
  }
}

async function newNote(parentId, tpl) {
  if (!discardLocalFileIfNeeded()) return;
  // blur whatever triggered this (usually the "+ new note" button) right away — newNote() doesn't
  // move focus into the new note until after two awaited network round-trips below, and a focused
  // <button> natively re-fires its click on every Space/Enter keystroke typed in that gap. Without
  // this, typing immediately after clicking "+ new note" (completely normal behavior) spams out
  // duplicate notes, one per space/enter typed before the real note finishes opening.
  if (document.activeElement && document.activeElement.blur) document.activeElement.blur();
  parentId = parentId || null;
  const id = uid();
  // template bodies are functions when they depend on today's date (planners, calendars)
  const title = tpl ? tpl.name : "untitled";
  const body = tpl ? (typeof tpl.body === "function" ? tpl.body() : tpl.body) : "";
  active = { id, title, body, strokes: [], updated: Date.now(), parent: parentId };
  activeId = id;
  mode = "insert";
  resetHistory();
  lcSaveNote(active); lcMarkPending(id);
  LC.set("glyph:" + ME + ":last", id);
  // add to local list so sidebar shows it immediately even if offline
  notes = [{ id, title, updated: active.updated, parent: parentId }, ...notes];
  if (parentId) expanded.add(parentId); // open the parent inline so the new child is visible
  try {
    // capture the server's `updated` (seconds) and overwrite the Date.now() (ms) placeholder above —
    // pollActiveNote() compares fresh.updated <= active.updated directly, so leaving the ms value in
    // place would make it look like this note is always "newer" than anything the server reports,
    // silently swallowing live-sync updates from another device until the first autosave fixes it
    const saved = await api("PUT", "/api/notes/" + id, { title, body, strokes: [], parent: parentId });
    active.updated = saved.updated;
    lcSaveNote(active);
    lcClearPending(id);
  } catch(e) { setOnline(false); }
  await loadList();
  renderMain(); renderBar(); renderStatus(); closeSidebar();
  focusEditor();
}

// full copy of the current note (body + ink) as a new sibling note — "title copy"
async function duplicateNote() {
  if (!active) return;
  const id = uid();
  const copy = { id, title: (active.title || "untitled") + " copy", body: active.body,
    strokes: active.strokes || [], updated: Date.now(), parent: active.parent || null };
  lcSaveNote(copy); lcMarkPending(id);
  notes = [{ id, title: copy.title, updated: copy.updated, parent: copy.parent }, ...notes];
  try {
    const saved = await api("PUT", "/api/notes/" + id,
      { title: copy.title, body: copy.body, strokes: copy.strokes, parent: copy.parent });
    copy.updated = saved.updated;
    lcSaveNote(copy); lcClearPending(id);
  } catch (e) { setOnline(false); }
  await loadList();
  await openNote(id).catch(() => {});
}

// downloads the current note as a plain .md file — works everywhere (same Blob trick
// saveLocalFile() already uses for its Safari/Firefox path)
function downloadNoteMd() {
  if (!active) return;
  const blob = new Blob([active.body || ""], { type: "text/markdown" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = (active.title || "note").replace(/[\\/:*?"<>|]/g, "_") + ".md";
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

/* ---- templates ----
   Prebuilt note bodies in plain markdown, all made of block types the editor already
   understands (headings, todos, tables) — so a "money planner" is just a note, editable
   like any other, synced like any other, and it opens fine in Obsidian too. */
function todayStr() { return new Date().toDateString().toLowerCase(); }

// generates a real pipe-table calendar for any month — days laid out Monday-first,
// blank cells pad the first and last weeks like a paper calendar
function monthCalendarMarkdown(d) {
  d = d || new Date();
  const y = d.getFullYear(), m = d.getMonth();
  const monthName = d.toLocaleString("en", { month: "long" }).toLowerCase();
  const days = new Date(y, m + 1, 0).getDate();     // day 0 of next month = last day of this one
  const startCol = (new Date(y, m, 1).getDay() + 6) % 7; // getDay() is Sunday-first; shift to Monday-first
  const names = ["mon", "tue", "wed", "thu", "fri", "sat", "sun"];
  const rows = [];
  let week = new Array(7).fill(" ");
  for (let day = 1; day <= days; day++) {
    const col = (startCol + day - 1) % 7;
    week[col] = String(day);
    if (col === 6 || day === days) { rows.push(week); week = new Array(7).fill(" "); }
  }
  return "## " + monthName + " " + y + "\n\n" +
    ["| " + names.join(" | ") + " |",
     "| " + names.map(() => "---").join(" | ") + " |",
     ...rows.map((r) => "| " + r.join(" | ") + " |")].join("\n");
}

const TEMPLATES = [
  { name: "daily planner", body: () =>
    "# " + todayStr() + "\n\n## top 3\n\n- [ ] \n- [ ] \n- [ ] \n\n## schedule\n\n" +
    "| time | plan |\n| --- | --- |\n| 06:00 |  |\n| 09:00 |  |\n| 12:00 |  |\n| 15:00 |  |\n| 18:00 |  |\n| 21:00 |  |\n\n## notes\n" },
  { name: "weekly planner", body: () =>
    "# week of " + todayStr() + "\n\n" +
    ["mon", "tue", "wed", "thu", "fri", "sat", "sun"].map((d) => "## " + d + "\n\n- [ ] ").join("\n\n") +
    "\n\n## wins this week\n" },
  { name: "monthly calendar", body: () => "# calendar\n\n" + monthCalendarMarkdown() },
  { name: "money planner", body: () =>
    "# money — " + new Date().toLocaleString("en", { month: "long" }).toLowerCase() + " " + new Date().getFullYear() +
    "\n\n## income\n\n| source | amount |\n| --- | --- |\n| salary |  |\n| other |  |\n\n" +
    "## fixed expenses\n\n| item | budget | actual |\n| --- | --- | --- |\n| rent |  |  |\n| internet |  |  |\n| subscriptions |  |  |\n| food |  |  |\n\n" +
    "## spending log\n\n| date | what | amount |\n| --- | --- | --- |\n|  |  |  |\n\n" +
    "## summary\n\n- income total: \n- spent total: \n- saved: " },
  { name: "habit tracker", body: () =>
    "# habits — week of " + todayStr() + "\n\n" +
    "| habit | mon | tue | wed | thu | fri | sat | sun |\n| --- | --- | --- | --- | --- | --- | --- | --- |\n" +
    "| sleep by 12 |  |  |  |  |  |  |  |\n| workout |  |  |  |  |  |  |  |\n| no junk food |  |  |  |  |  |  |  |\n| read 20 min |  |  |  |  |  |  |  |" },
  { name: "goal tracker", body:

/* ---- local files ----
   Completely separate from the notes vault: opens/saves a real file on disk from the browser.
   Two paths depending on what the browser supports:
   - Chrome/Brave/Edge (File System Access API): a real handle to the original file, so "save"
     overwrites it in place — same as any native editor.
   - Safari/Firefox (no such API — a WebKit/Gecko platform limitation, not something a web page
     can work around): open still works via a plain <input type="file">, but there's no way for
     a browser to write back to an arbitrary path the user picked, so "save" instead downloads an
     updated copy under the same filename. localFile.handle is null on this path — that's the flag
     renderLocalFileView() and saveLocalFile() branch on. */

function discardLocalFileIfNeeded() {
  if (!localFile || !localFile.dirty) { localFile = null; return true; }
  if (confirm("Discard unsaved changes to " + localFile.name + "?")) { localFile = null; return true; }
  return false;
}

async function openLocalFile() {
  if (!discardLocalFileIfNeeded()) return;
  if (!window.showOpenFilePicker) { $("#lfInput").click(); return; } // Safari/Firefox fallback
  let handle;
  try {
    [handle] = await window.showOpenFilePicker({
      types: [{
        description: "Text and code files",
        accept: { "text/plain": [".py", ".sh", ".js", ".ts", ".json", ".md", ".txt", ".yml", ".yaml", ".toml", ".c", ".cpp", ".h", ".go", ".rs", ".html", ".css", ".rb", ".java"] },
      }],
      excludeAcceptAllOption: false,
    });
  } catch (e) { return; } // user cancelled the picker — not an error
  const file = await handle.getFile();
  const content = await file.text();
  localFile = { handle, name: file.name, content, dirty: false };
  active = null; activeId = null; // local-file view replaces the note view, not layered on top of it
  renderLocalFileView();
  renderBar();
  renderList(); // sidebar's "sync to glyph" row only shows while a file is open
}

// wired once at startup — fires when the fallback <input type="file"> picker (Safari/Firefox) resolves
$("#lfInput").addEventListener("change", async () => {
  const file = $("#lfInput").files[0];
  $("#lfInput").value = ""; // reset so picking the same file again still fires change next time
  if (!file) return;
  const content = await file.text();
  localFile = { handle: null, name: file.name, content, dirty: false };
  active = null; activeId = null;
  renderLocalFileView();
  renderBar();
  renderList();
});

function renderLocalFileView() {
  const main = $("#main");
  main.innerHTML =
    '<div class="localfile-bar">' +
      '<span class="localfile-name" id="lfName"></span>' +
      '<div class="spacer"></div>' +
      (localFile.handle ? "" : '<span class="localfile-hint hide-sm">no write access in this browser — saves as a download</span>') +
      '<button class="ghost sm" id="lfSync" title="Copy this file\'s current content into a new note in your vault">sync to notes</button>' +
      '<button class="ghost sm" id="lfSave">' + (localFile.handle ? "save" : "download") + '</button>' +
      '<button class="ghost sm" id="lfClose">close</button>' +
    '</div>' +
    '<textarea class="editor" id="lfEditor" spellcheck="false"></textarea>';
  paintLocalFileBar();
  const ta = $("#lfEditor");
  ta.value = localFile.content;
  ta.addEventListener("input", () => { localFile.content = ta.value; localFile.dirty = true; paintLocalFileBar(); });
  $("#lfSave").onclick = saveLocalFile;
  $("#lfSync").onclick = syncLocalFileToNote;
  $("#lfClose").onclick = () => { if (discardLocalFileIfNeeded()) { renderMain(); renderBar(); renderList(); } };
  ta.focus();
}

// one-time copy, not a live/continuing sync — there's no ongoing link back to the file on disk
// afterward, same limitation saveLocalFile() has on Safari/Firefox (no filesystem write access
// to keep them in agreement over time). This just gets the file's current content into the vault
// as a real note, so it's on every device and can be edited like any other note from then on.
async function syncLocalFileToNote() {
  if (!localFile) return;
  const btn = $("#lfSync");
  if (btn) { btn.disabled = true; btn.textContent = "syncing…"; }
  const name = localFile.name, content = localFile.content;
  try {
    const id = uid();
    const saved = await api("PUT", "/api/notes/" + id, { title: name, body: content, strokes: [], parent: null });
    localFile = null; // the note is the new source of truth — leave the local-file session behind
    active = { ...saved, strokes: [] };
    activeId = saved.id;
    await loadList();
    renderMain(); renderBar(); renderStatus();
  } catch (e) {
    alert("Couldn't sync " + name + " to notes: " + e.message);
    if (btn) { btn.disabled = false; btn.textContent = "sync to notes"; }
  }
}

function paintLocalFileBar() {
  const el = $("#lfName");
  if (el) el.textContent = localFile.name + (localFile.dirty ? " •" : "");
}

async function saveLocalFile() {
  if (!localFile) return;
  const btn = $("#lfSave");
  if (localFile.handle) {
    if (btn) { btn.disabled = true; btn.textContent = "saving…"; }
    try {
      const writable = await localFile.handle.createWritable();
      await writable.write(localFile.content);
      await writable.close();
      localFile.dirty = false;
      paintLocalFileBar();
    } catch (e) {
      alert("Couldn't save " + localFile.name + ": " + e.message);
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = "save"; }
    }
    return;
  }
  // no filesystem write access here — download an updated copy under the same name instead
  const blob = new Blob([localFile.content], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = localFile.name;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  localFile.dirty = false;
  paintLocalFileBar();
}

async function removeNote(id) {
  try { await api("DELETE", "/api/notes/" + encodeURIComponent(id)); } catch (e) {}
  if (id === activeId) { active = null; activeId = null; }
  await loadList();
  if (!activeId && notes[0]) { await openNote(notes[0].id); }
  else { renderMain(); renderBar(); renderStatus(); }
}

// full ancestor path for the active note, e.g. "Project X ❯ Sub note" for a nested note —
// not just its own title, so the top bar reflects how deep it's actually nested (reads as a
// continuation of the "~/notes ❯" prompt right before it)
function activeBreadcrumb() {
  if (!active) return "";
  const chain = [active.title || "untitled"];
  let parentId = active.parent || null;
  let hops = 0;
  while (parentId && hops <= notes.length) {
    const p = notes.find((n) => n.id === parentId);
    if (!p) break;
    chain.unshift(p.title || "untitled");
    parentId = p.parent || null;
    hops++;
  }
  return chain.join(" ❯ ");
}

/* ---- render: sidebar (tree) ---- */

// builds a nested tree from the flat notes array using the parent field
// true if walking up `startId`'s parent chain ever reaches `id` — used to stop a note
// from nesting under its own descendant, which would wall it (and its cycle-mates) off
// from every root and make them silently vanish from the sidebar. Server-side write_note
// already refuses to create these, but notes are plain markdown files that can be hand-edited
// (e.g. via Obsidian), so the client stays defensive too — bounded by note count in case a
// cycle already exists on disk.
function isDescendantOf(byId, id, startId) {
  let cur = startId, hops = 0;
  while (cur && hops <= Object.keys(byId).length) {
    if (cur === id) return true;
    cur = byId[cur] && byId[cur].parent;
    hops++;
  }
  return false;
}

function buildTree(notesList) {
  const byId = {};
  notesList.forEach(n => { byId[n.id] = { ...n, children: [] }; });
  const roots = [];
  notesList.forEach(n => {
    if (n.parent && byId[n.parent] && !isDescendantOf(byId, n.id, n.parent)) byId[n.parent].children.push(byId[n.id]);
    else roots.push(byId[n.id]);
  });
  const sortFn = arr => { arr.sort((a, b) => b.updated - a.updated); arr.forEach(n => sortFn(n.children)); };
  sortFn(roots);
  return roots;
}

// walk up the ancestor chain and add each ancestor to expanded so the active note stays visible
function expandToActive() {
  if (!activeId) return;
  const parentOf = {};
  notes.forEach(n => { if (n.parent) parentOf[n.id] = n.parent; });
  let id = activeId;
  while (parentOf[id]) { id = parentOf[id]; expanded.add(id); }
}

// recursively renders tree nodes as <li> elements; depth controls the left indent. Notes with
// children get a plain ▸/▾ arrow to expand them inline (right underneath, indented) — no separate
// screen, no navigating away — closer to a real folder tree than a drill-down file browser.
function renderTreeNodes(nodesArr, depth) {
  return nodesArr.map(n => {
    const sel = n.id === activeId;
    const hasKids = n.children.length > 0;
    const isOpen = expanded.has(n.id);
    const pl = 8 + depth * 16;
    const toggle = hasKids
      ? '<button class="tree-tog" data-tog="' + esc(n.id) + '">' + (isOpen ? "▾" : "▸") + "</button>"
      : '<span class="tree-leaf"></span>';
    return (
      '<li class="row' + (sel ? " sel" : "") + '" data-id="' + esc(n.id) + '" style="padding-left:' + pl + 'px">' +
        toggle +
        '<span class="name">' + esc(n.title || "untitled") + "</span>" +
        (n.hasInk ? '<span class="ink" title="has a sketch">✦</span>' : "") +
        '<button class="addchild" data-par="' + esc(n.id) + '" aria-label="New note inside" title="New note inside">+</button>' +
        '<button class="del" data-del="' + esc(n.id) + '" aria-label="Delete note">' + ICONS.trash + "</button>" +
      "</li>" +
      (hasKids && isOpen ? renderTreeNodes(n.children, depth + 1) : "")
    );
  }).join("");
}

function toggleExpand(id) {
  if (expanded.has(id)) expanded.delete(id); else expanded.add(id);
  renderList();
}

/* ---- command palette ---- */
// subsequence fuzzy match: every char of query must appear in target, in order.
// score rewards matches that start at a word boundary and matches with fewer gaps.
function fuzzyScore(query, target) {
  query = query.toLowerCase();
  target = target.toLowerCase();
  if (!query) return 0;
  let qi = 0, score = 0, lastMatch = -1;
  for (let ti = 0; ti < target.length && qi < query.length; ti++) {
    if (target[ti] === query[qi]) {
      const boundary = ti === 0 || /[\s\-_/]/.test(target[ti - 1]);
      score += boundary ? 10 : (lastMatch === ti - 1 ? 5 : 1);
      lastMatch = ti;
      qi++;
    }
  }
  return qi === query.length ? score : -1; // -1 = not a match at all
}

// notes[] is already sorted most-recently-updated-first (server-side, see list_meta()), so

let paletteSel = 0;
let paletteFiltered = [];
// collapsed by default the first time? no — defaults open (like recent notes being useful out of
// the box), but remembers your choice per device once you collapse it, same pattern as theme/penOnly
let paletteRecentCollapsed = readPaletteRecentCollapsed();
function readPaletteRecentCollapsed() { try { return localStorage.getItem("glyph:paletteRecentCollapsed") === "1"; } catch (e) { return false; } }
function setPaletteRecentCollapsed(v) { paletteRecentCollapsed = v; try { localStorage.setItem("glyph:paletteRecentCollapsed", v ? "1" : "0"); } catch (e) {} }

// positions the dropdown under #searchBar's actual on-screen rect (it's not inside any element
// with its own positioning context, so this has to be computed in JS, not pure CSS) and (re)opens
// it with whatever's currently in the search input, if anything — safe to call repeatedly
// (e.g. re-entered via the search input's own focus handler) since it's fully idempotent
function openPalette() {
  const bar = $("#searchBar");
  const dropdown = $("#paletteDropdown");
  if (!bar || !dropdown) return;
  const rect = bar.getBoundingClientRect();
  const width = Math.max(rect.width, 280);
  dropdown.style.left = Math.max(8, Math.min(rect.left, window.innerWidth - width - 8)) + "px";
  dropdown.style.top = (rect.bottom + 6) + "px";
  dropdown.style.width = width + "px";
  dropdown.innerHTML = '<ul class="palette-list" id="paletteList"></ul>';
  dropdown.hidden = false;
  const input = $("#searchBarInput");
  renderPaletteResults(input.value || "");
  if (document.activeElement !== input) input.focus(); // guarded: avoids re-firing this via onfocus
}

function closePalette() {
  const dropdown = $("#paletteDropdown");
  if (dropdown) dropdown.hidden = true;
  const input = $("#searchBarInput");
  if (input) input.value = "";
}

function renderPaletteResults(query) {
  const { noteItems, actionItems, templateItems } = paletteItemGroups();
  const list = $("#paletteList");
  if (!list) return;
  let html = "";
  if (query) {
    paletteFiltered = noteItems.concat(actionItems).concat(templateItems)
      .map((it) => ({ it, score: fuzzyScore(query, it.label) }))
      .filter((x) => x.score >= 0)
      .sort((a, b) => b.score - a.score)
      .map((x) => x.it)
      .slice(0, 9);
    html = paletteFiltered.map((it, i) => paletteRowHtml(it, i)).join("");
  } else {
    // nothing typed yet — browse mode: recent notes (already in recency order) up top, actions below.
    // "recent notes" itself is collapsible (see paletteRecentCollapsed) — collapsed items still
    // don't count toward paletteFiltered/arrow-key nav, they're just not there while hidden
    const recentAll = noteItems.slice(0, 8);
    const shownRecent = paletteRecentCollapsed ? [] : recentAll;
    const actions = actionItems.slice(0, 10);
    paletteFiltered = shownRecent.concat(actions).concat(templateItems);
    if (recentAll.length) {
      html += '<div class="palette-section palette-section-toggle" id="paletteRecentToggle">' +
        (paletteRecentCollapsed ? "▸" : "▾") + " recent notes</div>";
      html += shownRecent.map((it, i) => paletteRowHtml(it, i)).join("");
    }
    if (actions.length) html += '<div class="palette-section">actions</div>' + actions.map((it, i) => paletteRowHtml(it, shownRecent.length + i)).join("");
    html += '<div class="palette-section">templates</div>' + templateItems.map((it, i) => paletteRowHtml(it, shownRecent.length + actions.length + i)).join("");
  }
  paletteSel = 0;
  if (!paletteFiltered.length) { list.innerHTML = '<div class="palette-empty">no matches</div>'; return; }
  list.innerHTML = html;
  const recentToggle = $("#paletteRecentToggle");
  if (recentToggle) {
    recentToggle.addEventListener("mousedown", (e) => e.preventDefault()); // don't blur the input first
    recentToggle.onclick = () => { setPaletteRecentCollapsed(!paletteRecentCollapsed); renderPaletteResults($("#searchBarInput").value || ""); };
  }
  list.querySelectorAll("li").forEach((li) => {
    li.addEventListener("mousedown", (e) => e.preventDefault()); // don't blur the input before the click below fires
    li.onclick = () => runPaletteItem(parseInt(li.getAttribute("data-i"), 10));
  });
  paintPaletteSelection();
}

function paletteRowHtml(it, i) {
  return '<li data-i="' + i + '"><span class="kind">' + it.kind + "</span>" + esc(it.label) + "</li>";
}

function paintPaletteSelection() {
  const list = $("#paletteList");
  if (!list) return;
  list.querySelectorAll("li").forEach((li, i) => {
    const isSel = i === paletteSel;
    li.classList.toggle("sel", isSel);
    // arrow-key navigation used to only move the highlight — the list itself never scrolled, so
    // selecting an item below the visible area left you highlighting something you couldn't see
    if (isSel) li.scrollIntoView({ block: "nearest" });
  });
}

function runPaletteItem(i) {
  const item = paletteFiltered[i];
  if (!item) return;
  closePalette();
  const input = $("#searchBarInput");
  if (input) input.blur();
  item.run();
}

// closes the dropdown on a click anywhere outside it or the search bar itself
document.addEventListener("click", (e) => {
  const dropdown = $("#paletteDropdown");
  const bar = $("#searchBar");
  if (dropdown && !dropdown.hidden && !dropdown.contains(e.target) && bar && !bar.contains(e.target)) closePalette();
});
// don't leave it stale-positioned under the bar across a resize/rotation — cheap to just reopen
window.addEventListener("resize", () => { const d = $("#paletteDropdown"); if (d && !d.hidden) closePalette(); });

/* ---- [[ ]] link autocomplete ---- */
let wikiOpen = false;
let wikiMatches = [];
let wikiSel = 0;
let wikiStart = -1; // index of the char right after the triggering "[[" in ed.value

// looks backwards from the caret for an unclosed "[[" on the current line
function findWikiTrigger(text, caret) {
  const lineStart = text.lastIndexOf("\n", caret - 1) + 1;
  const openAt = text.lastIndexOf("[[", caret - 1);
  if (openAt < lineStart) return -1;
  const between = text.slice(openAt + 2, caret);
  if (between.includes("]]") || between.includes("[[") || between.includes("\n")) return -1;
  return openAt + 2;
}

function checkWikiTrigger(ed) {
  const caret = ed.selectionStart;
  const start = findWikiTrigger(ed.value, caret);
  if (start === -1) { closeWikiPopup(); return; }
  wikiStart = start;
  const query = ed.value.slice(start, caret);
  wikiMatches = notes
    .map((n) => ({ n, score: fuzzyScore(query, n.title) }))
    .filter((x) => x.score >= 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 6)
    .map((x) => x.n);
  if (!wikiMatches.length) { closeWikiPopup(); return; }
  wikiOpen = true;
  wikiSel = 0;
  renderWikiPopup(ed);
}

function renderWikiPopup(ed) {
  let el = $("#wikiPopup");
  if (!el) {
    el = document.createElement("ul");
    el.id = "wikiPopup";
    el.className = "wiki-popup";
    $("#main").appendChild(el);
  }
  el.innerHTML = wikiMatches
    .map((n, i) => '<li data-i="' + i + '" class="' + (i === wikiSel ? "sel" : "") + '">' + esc(n.title) + "</li>")
    .join("");
  el.querySelectorAll("li").forEach((li) => {
    li.onmousedown = (e) => { e.preventDefault(); insertWikiLink(ed, parseInt(li.getAttribute("data-i"), 10)); };
  });
}

function paintWikiSelection() {
  const el = $("#wikiPopup");
  if (el) el.querySelectorAll("li").forEach((li, i) => li.classList.toggle("sel", i === wikiSel));
}

function closeWikiPopup() {
  wikiOpen = false;
  const el = $("#wikiPopup");
  if (el) el.remove();
}

function insertWikiLink(ed, i) {
  const n = wikiMatches[i];
  if (!n) return;
  const caret = ed.selectionStart;
  const before = ed.value.slice(0, wikiStart);
  const after = ed.value.slice(caret);
  const insertion = n.title + "]]";
  ed.value = before + insertion + after;
  const newCaret = wikiStart + insertion.length;
  ed.setSelectionRange(newCaret, newCaret);
  active.body = ed.value;
  scheduleSave();
  closeWikiPopup();
  ed.focus();
}

/* ---- block editor (Phase 2) ----
   On by default now — localStorage["glyph:blockEditor"] = "0" is the explicit opt-out
   (kept so anyone who already toggled it off during the opt-in beta stays off).
   active.body (markdown string) stays the one source of truth: blocks[] is always a
   derived view, reparsed from active.body on every renderMain() call. That's what keeps
   this safe to bolt onto the existing offline-save/sync machinery unmodified — syncBody()
   is the only place that writes back into active.body, exactly like ed.value did before. */

const BLOCK_EDITOR_KEY = "glyph:blockEditor";
function blockEditorEnabled() { try { return localStorage.getItem(BLOCK_EDITOR_KEY) !== "0"; } catch (e) { return true; } }
function setBlockEditorEnabled(on) { try { localStorage.setItem(BLOCK_EDITOR_KEY, on ? "1" : "0"); } catch (e) {} }

let blocks = []; // in-memory blocks for the currently open note (text mode only)
let localFile = null; // { handle, name, content, dirty } — a file opened from disk via the
                       // browser's File System Access API, entirely separate from the notes vault

function splitTableRow(line) {
  let s = line.trim();
  if (s.startsWith("|")) s = s.slice(1);
  if (s.endsWith("|")) s = s.slice(0, -1);
  return s.split("|").map((c) => c.trim());
}

// markdown string -> Block[]. Block = {id, type, text, level, checked, indent, header, rows, lang}
function parseBlocks(md) {
  const lines = (md || "").split("\n");
  const out = [];
  let i = 0;
  let paraBuf = [];
  function flushPara() {
    if (paraBuf.length) { out.push({ id: uid(), type: "p", text: paraBuf.join("\n") }); paraBuf = []; }
  }

  while (i < lines.length) {
    const line = lines[i];

    if (line.trim() === "") { flushPara(); i++; continue; }

    let m = line.match(/^```(\w*)\s*$/);
    if (m) {
      flushPara();
      const lang = m[1] || "";
      const body = [];
      i++;
      while (i < lines.length && !/^```\s*$/.test(lines[i])) { body.push(lines[i]); i++; }
      i++; // skip closing fence
      out.push({ id: uid(), type: "code", text: body.join("\n"), lang });
      continue;
    }

    // toggle block: <details><summary>...</summary> ... </details> — valid raw HTML
    // embedded in markdown, so Obsidian renders it as a real native collapsible section too
    if (/^<details>\s*$/.test(line)) {
      flushPara();
      i++;
      let summary = "";
      if (i < lines.length) {
        const sm = lines[i].match(/^<summary>(.*)<\/summary>\s*$/);
        if (sm) { summary = sm[1]; i++; }
      }
      const body = [];
      while (i < lines.length && !/^<\/details>\s*$/.test(lines[i])) { body.push(lines[i]); i++; }
      i++; // skip the closing </details>
      if (body[0] === "") body.shift();
      if (body[body.length - 1] === "") body.pop();
      out.push({ id: uid(), type: "toggle", text: summary, body: body.join("\n") });
      continue;
    }

    if (/^\s*\|.*\|\s*$/.test(line) && i + 1 < lines.length && /^\s*\|?[\s:|-]+\|?\s*$/.test(lines[i + 1]) && lines[i + 1].includes("-")) {
      flushPara();
      const header = splitTableRow(line);
      i += 2; // skip header + separator row
      const rows = [];
      while (i < lines.length && /^\s*\|.*\|\s*$/.test(lines[i])) { rows.push(splitTableRow(lines[i])); i++; }
      out.push({ id: uid(), type: "table", header, rows });
      continue;
    }

    m = line.match(/^(#{1,3})\s+(.*)$/);
    if (m) { flushPara(); out.push({ id: uid(), type: "h", level: m[1].length, text: m[2] }); i++; continue; }

    if (/^-{3,}\s*$/.test(line)) { flushPara(); out.push({ id: uid(), type: "hr" }); i++; continue; }

    m = line.match(/^(\s*)-\s\[([ xX])\]\s+(.*)$/);
    if (m) { flushPara(); out.push({ id: uid(), type: "todo", checked: m[2].toLowerCase() === "x", text: m[3], indent: Math.floor(m[1].length / 2) }); i++; continue; }

    m = line.match(/^(\s*)-\s+(.*)$/);
    if (m) { flushPara(); out.push({ id: uid(), type: "ul", text: m[2], indent: Math.floor(m[1].length / 2) }); i++; continue; }

    m = line.match(/^(\s*)\d+\.\s+(.*)$/);
    if (m) { flushPara(); out.push({ id: uid(), type: "ol", text: m[2], indent: Math.floor(m[1].length / 2) }); i++; continue; }

    if (/^>\s?/.test(line)) {
      flushPara();
      const qlines = [];
      while (i < lines.length && /^>\s?/.test(lines[i])) { qlines.push(lines[i].replace(/^>\s?/, "")); i++; }
      out.push({ id: uid(), type: "quote", text: qlines.join("\n") });
      continue;
    }

    paraBuf.push(line);
    i++;
  }
  flushPara();
  if (!out.length) out.push({ id: uid(), type: "p", text: "" });
  return out;
}

// Block[] -> markdown string. Verified round-trip stable against a fixture covering every
// type (see scratchpad/blocktest.js during development) — not byte-identical to arbitrary
// input formatting, but stable: parse(serialize(parse(x))) always equals parse(serialize(x)).
function serializeBlocks(list) {
  const LIST_TYPES = new Set(["ul", "ol", "todo"]);
  let olN = 0; // running counter so numbered lists serialize as 1. 2. 3., resetting on any non-ol block
  const lines = list.map((b) => {
    olN = b.type === "ol" ? olN + 1 : 0;
    switch (b.type) {
      case "h": return "#".repeat(b.level) + " " + b.text;
      case "todo": return "  ".repeat(b.indent || 0) + "- [" + (b.checked ? "x" : " ") + "] " + b.text;
      case "ul": return "  ".repeat(b.indent || 0) + "- " + b.text;
      case "ol": return "  ".repeat(b.indent || 0) + olN + ". " + b.text;
      case "quote": return b.text.split("\n").map((l) => "> " + l).join("\n");
      case "code": return "```" + (b.lang || "") + "\n" + b.text + "\n```";
      case "hr": return "---";
      case "toggle": return "<details>\n<summary>" + (b.text || "") + "</summary>\n\n" + (b.body || "") + "\n\n</details>";
      case "table": {
        const header = "| " + b.header.join(" | ") + " |";
        const sep = "| " + b.header.map(() => "---").join(" | ") + " |";
        const rows = b.rows.map((r) => "| " + r.join(" | ") + " |");
        return [header, sep, ...rows].join("\n");
      }
      case "p":
      default:
        return b.text;
    }
  });
  let out = "";
  for (let i = 0; i < list.length; i++) {
    if (i > 0) {
      const tight = LIST_TYPES.has(list[i].type) && list[i].type === list[i - 1].type;
      out += tight ? "\n" : "\n\n";
    }
    out += lines[i];
  }
  return out;
}

// the one choke point that writes blocks[] back into active.body — everything downstream
// (scheduleSave, lcSaveNote, syncPending) is completely unchanged from the textarea version.
// Being the single write path also makes it the perfect place to capture undo snapshots:
// every edit of any kind (typing, split, merge, move, convert, table edits) passes through here.
function syncBody() {
  pushUndo(active.body); // the body as it was BEFORE this edit
  active.body = serializeBlocks(blocks);
  lastTyped = Date.now();
  scheduleSave();
  scheduleInkResize(); // content height may have changed — grow the ink canvas to match
}

// debounced — text height changes on almost every keystroke, resizing canvases that often
// would repaint all strokes constantly for no visible benefit
let inkResizeTimer = null;
function scheduleInkResize() {
  if (!$("#noteScroll")) return;
  clearTimeout(inkResizeTimer);
  inkResizeTimer = setTimeout(sizeInkCanvas, 400);
}

/* ---- caret helpers (Selection/Range API) ---- */
function getCaretOffset(el) {
  const sel = window.getSelection();
  if (!sel.rangeCount) return 0;
  const range = sel.getRangeAt(0).cloneRange();
  range.selectNodeContents(el);
  range.setEnd(sel.getRangeAt(0).endContainer, sel.getRangeAt(0).endOffset);
  return range.toString().length;
}

function setCaretOffset(el, pos) {
  const sel = window.getSelection();
  const range = document.createRange();
  let remaining = pos, found = false;
  (function walk(n) {
    if (found) return;
    if (n.nodeType === Node.TEXT_NODE) {
      if (remaining <= n.length) { range.setStart(n, remaining); found = true; }
      else remaining -= n.length;
    } else {
      for (const child of n.childNodes) { walk(child); if (found) return; }
    }
  })(el);
  if (!found) { range.selectNodeContents(el); range.collapse(false); }
  else range.collapse(true);
  sel.removeAllRanges();
  sel.addRange(range);
}

// current text selection, as character offsets into el's text — same coordinate
// space as getCaretOffset/setCaretOffset, just for a non-collapsed range
function getSelectionRange(el) {
  const sel = window.getSelection();
  if (!sel.rangeCount) return { start: 0, end: 0 };
  const range = sel.getRangeAt(0);
  const pre = range.cloneRange();
  pre.selectNodeContents(el);
  pre.setEnd(range.startContainer, range.startOffset);
  const start = pre.toString().length;
  return { start, end: start + range.toString().length };
}

/* ---- inline formatting: **bold**, *italic*, ~~strikethrough~~, [[links]] ----
   b.text (raw markdown) stays the source of truth — this only ever renders a display
   version into a blurred block, or wraps a selection with markdown syntax. When a block
   is focused for editing it always shows plain b.text (see the focus handler above), so
   this never has to reconcile edits made inside formatted markup. */
// group order matters — [[wiki]] before [md](links), **bold** before *italic*, and
// `code` / ==highlight== before italic so their inner chars never get half-matched
const INLINE_RE = /\[\[([^\]]+)\]\]|\*\*([^*]+)\*\*|~~([^~]+)~~|`([^`]+)`|==([^=]+)==|\[([^\]]+)\]\(([^)\s]+)\)|\*([^*]+)\*/g;

function renderInlineInto(el, text) {
  el.innerHTML = "";
  if (!text) return; // empty — let the :empty::before placeholder show
  let lastIndex = 0;
  INLINE_RE.lastIndex = 0;
  let m;
  while ((m = INLINE_RE.exec(text))) {
    if (m.index > lastIndex) el.appendChild(document.createTextNode(text.slice(lastIndex, m.index)));
    if (m[1] !== undefined) {
      const title = m[1].trim(); // tolerate [[ title ]] typed by hand with stray spaces —
                                  // extract_links() on the server already does the same
      const span = document.createElement("span");
      span.className = "wiki-link-rendered";
      span.textContent = title;
      // mousedown preventDefault stops the click from focusing/placing a caret in the
      // contenteditable parent first — otherwise the block would flip to raw-edit mode
      // (via the focus handler) before the click handler below ever got to navigate
      span.addEventListener("mousedown", (e) => e.preventDefault());
      span.addEventListener("click", (e) => {
        e.preventDefault(); e.stopPropagation();
        const target = notes.find((n) => n.title.toLowerCase() === title.toLowerCase());
        if (target) openNote(target.id);
      });
      el.appendChild(span);
    } else if (m[2] !== undefined) {
      const strong = document.createElement("strong");
      strong.textContent = m[2];
      el.appendChild(strong);
    } else if (m[3] !== undefined) {
      const s = document.createElement("s");
      s.textContent = m[3];
      el.appendChild(s);
    } else if (m[4] !== undefined) {
      // `inline code` — styled span, still plain text underneath
      const code = document.createElement("span");
      code.className = "inline-code";
      code.textContent = m[4];
      el.appendChild(code);
    } else if (m[5] !== undefined) {
      // ==highlight== — Obsidian's syntax, renders as a real <mark>
      const mk = document.createElement("mark");
      mk.textContent = m[5];
      el.appendChild(mk);
    } else if (m[6] !== undefined) {
      // [text](url) markdown link — only http(s) urls become clickable, anything else
      // (javascript:, data:, …) stays plain text so a pasted note can't smuggle in script
      const href = m[7];
      if (/^https?:\/\//i.test(href)) {
        const a = document.createElement("a");
        a.className = "md-link";
        a.textContent = m[6];
        a.href = href;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.addEventListener("mousedown", (e) => e.preventDefault()); // same trick as wiki links —
        // don't let the click focus the block (flipping it to raw text) before the link opens
      el.appendChild(a);
      } else {
        el.appendChild(document.createTextNode(m[0]));
      }
    } else if (m[8] !== undefined) {
      const em = document.createElement("em");
      em.textContent = m[8];
      el.appendChild(em);
    }
    lastIndex = INLINE_RE.lastIndex;
  }
  if (lastIndex < text.length) el.appendChild(document.createTextNode(text.slice(lastIndex)));
}

// Cmd/Ctrl+B/I/Shift+X — wrap the current selection in markdown syntax. No-ops on a
// collapsed selection (v1 keeps this simple: select text first, then format it).
function wrapSelectionWith(b, el, wrap) {
  const { start, end } = getSelectionRange(el);
  if (start === end) return;
  const t = b.text || "";
  b.text = t.slice(0, start) + wrap + t.slice(start, end) + wrap + t.slice(end);
  el.textContent = b.text;
  syncBody();
  setCaretOffset(el, end + wrap.length * 2);
}

/* ---- block editor: rendering ---- */
function blockPlaceholder(b) {
  if (b.type === "h") return "heading";
  if (b.type === "todo") return "to-do";
  if (b.type === "quote") return "quote";
  return "";
}

function renderBlockEl(b) {
  if (b.type === "hr") {
    const hr = document.createElement("hr");
    hr.className = "block block-hr";
    hr.dataset.id = b.id;
    hr.title = "click to remove";
    hr.onclick = () => removeBlock(b.id);
    return hr;
  }

  if (b.type === "code") {
    const wrap = document.createElement("div");
    wrap.className = "block-code-wrap";
    wrap.dataset.id = b.id;
    const ta = document.createElement("textarea");
    ta.className = "block-code-ta";
    ta.value = b.text;
    ta.spellcheck = false;
    ta.addEventListener("input", () => { b.text = ta.value; syncBody(); });
    ta.addEventListener("keydown", (e) => { e.stopPropagation(); }); // let the browser handle Enter/Tab natively inside code
    ta.addEventListener("focus", () => {
      if (mode !== "insert") { mode = "insert"; setTimeout(() => { renderBar(); renderStatus(); }, 100); }
    });
    wrap.appendChild(ta);
    return wrap;
  }

  if (b.type === "toggle") {
    const details = document.createElement("details");
    details.className = "block-toggle";
    details.dataset.id = b.id;
    details.open = !!b.open;
    details.addEventListener("toggle", () => { b.open = details.open; });

    const summary = document.createElement("summary");
    const summaryText = document.createElement("span");
    summaryText.className = "toggle-summary-text";
    summaryText.contentEditable = "true";
    summaryText.textContent = b.text || "";
    summaryText.setAttribute("data-placeholder", "toggle");
    summaryText.addEventListener("click", (e) => e.preventDefault()); // click toggles the <details>; only the caret should land in text
    summaryText.addEventListener("mousedown", (e) => e.stopPropagation());
    summaryText.addEventListener("input", () => { b.text = summaryText.textContent; syncBody(); });
    summaryText.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); bodyTa.focus(); }
      else e.stopPropagation();
    });
    summary.appendChild(summaryText);

    const rmToggleBtn = document.createElement("button");
    rmToggleBtn.type = "button"; rmToggleBtn.className = "toggle-rm"; rmToggleBtn.textContent = "×";
    rmToggleBtn.title = "remove this toggle";
    rmToggleBtn.addEventListener("mousedown", (e) => e.stopPropagation()); // don't let it toggle open/closed
    rmToggleBtn.addEventListener("click", (e) => { e.preventDefault(); e.stopPropagation(); removeBlock(b.id); });
    summary.appendChild(rmToggleBtn);
    details.appendChild(summary);

    const bodyTa = document.createElement("textarea");
