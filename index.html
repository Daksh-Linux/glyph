    bodyTa.className = "block-toggle-body";
    bodyTa.value = b.body || "";
    bodyTa.placeholder = "toggle content…";
    bodyTa.addEventListener("input", () => { b.body = bodyTa.value; syncBody(); });
    bodyTa.addEventListener("keydown", (e) => e.stopPropagation());
    details.appendChild(bodyTa);

    return details;
  }

  if (b.type === "table") {
    const wrap = document.createElement("div");
    wrap.className = "block-table-wrap";
    wrap.dataset.id = b.id;
    const table = document.createElement("table");
    table.className = "block-table";

    const thead = document.createElement("tr");
    thead.appendChild(document.createElement("th")).className = "table-handle"; // empty corner
    b.header.forEach((cell, c) => {
      const th = makeTableCell(b, -1, c, cell, true);
      const rm = document.createElement("button");
      rm.type = "button"; rm.className = "table-rm-col"; rm.textContent = "×"; rm.title = "remove column";
      rm.onclick = (e) => { e.preventDefault(); removeTableColumn(b, c); };
      th.appendChild(rm);
      thead.appendChild(th);
    });
    const addColTh = document.createElement("th");
    addColTh.className = "table-add"; addColTh.textContent = "+"; addColTh.title = "add column";
    addColTh.onclick = () => addTableColumn(b);
    thead.appendChild(addColTh);
    table.appendChild(thead);

    b.rows.forEach((row, r) => {
      const tr = document.createElement("tr");
      const handle = document.createElement("td");
      handle.className = "table-handle";
      const rmRow = document.createElement("button");
      rmRow.type = "button"; rmRow.className = "table-rm-row"; rmRow.textContent = "×"; rmRow.title = "remove row";
      rmRow.onclick = () => removeTableRow(b, r);
      handle.appendChild(rmRow);
      tr.appendChild(handle);
      row.forEach((cell, c) => tr.appendChild(makeTableCell(b, r, c, cell, false)));
      tr.appendChild(document.createElement("td")); // spacer under the +col button
      table.appendChild(tr);
    });
    wrap.appendChild(table);

    const addRowBtn = document.createElement("button");
    addRowBtn.type = "button"; addRowBtn.className = "table-add-row"; addRowBtn.textContent = "+ row";
    addRowBtn.onclick = () => addTableRow(b);

    const rmTableBtn = document.createElement("button");
    rmTableBtn.type = "button"; rmTableBtn.className = "table-rm-all"; rmTableBtn.textContent = "remove table";
    rmTableBtn.title = "remove this whole table";
    rmTableBtn.onclick = () => removeBlock(b.id);

    const foot = document.createElement("div");
    foot.className = "table-foot";
    foot.appendChild(addRowBtn);
    foot.appendChild(rmTableBtn);
    wrap.appendChild(foot);
    return wrap;
  }

  // text-bearing blocks: p, h, ul, ol, todo, quote — one contenteditable holding plain text
  const container = document.createElement(b.type === "todo" || b.type === "ul" || b.type === "ol" ? "div" : "div");
  container.dataset.id = b.id;

  let textEl;
  if (b.type === "todo") {
    container.className = "block block-todo";
    container.style.paddingLeft = (b.indent || 0) * 20 + "px"; // Tab/Shift-Tab nesting, same as ul/ol
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = !!b.checked;
    cb.onchange = () => { b.checked = cb.checked; textEl.classList.toggle("checked", b.checked); syncBody(); };
    container.appendChild(cb);
    textEl = document.createElement("div");
    textEl.className = "block-text" + (b.checked ? " checked" : "");
    container.appendChild(textEl);
  } else if (b.type === "ul" || b.type === "ol") {
    container.className = "block block-" + b.type;
    container.style.paddingLeft = (b.indent || 0) * 20 + "px";
    const marker = document.createElement("span");
    marker.className = "marker";
    marker.textContent = b.type === "ul" ? "•" : (b._n || 1) + "."; // _n computed in renderEditorBlocks
    container.appendChild(marker);
    textEl = document.createElement("div");
    textEl.className = "block-text";
    container.appendChild(textEl);
  } else {
    textEl = container;
    textEl.className = "block" + (b.type === "h" ? " block-h" + b.level : b.type === "quote" ? " block-quote" : "");
  }

  textEl.contentEditable = "true";
  renderInlineInto(textEl, b.text || ""); // rendered (clickable links, bold/italic) until focused
  textEl.setAttribute("data-placeholder", blockPlaceholder(b));

  textEl.addEventListener("input", () => {
    b.text = textEl.textContent;
    if (applyTypeTrigger(b)) { syncBody(); renderEditorBlocks(); focusBlock(b.id, (b.text || "").length); return; }
    syncBody();
    checkSlashTrigger(textEl, b);
    if (!slashOpen) checkWikiTriggerCE(textEl, b); // one popup at a time — / wins over [[
  });
  textEl.addEventListener("paste", (e) => {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData("text/plain");
    document.execCommand("insertText", false, text);
  });
  textEl.addEventListener("focus", () => {
    textEl.textContent = b.text || ""; // switch to raw markdown source for editing
    if (mode !== "insert") { mode = "insert"; setTimeout(() => { renderBar(); renderStatus(); }, 100); }
  });
  textEl.addEventListener("blur", () => {
    closeWikiPopup();
    closeSlash();
    renderInlineInto(textEl, b.text || ""); // switch back to rendered (links clickable, bold/italic styled)
    if (b === blocks[0] && b.type !== "h") return; // title still comes from the first line, same rule as before
    maybeUpdateTitleFromFirstBlock();
  });
  textEl.addEventListener("keydown", (e) => {
    if (slashOpen && slashBlock === b) {
      if (e.key === "Escape") { e.preventDefault(); e.stopPropagation(); closeSlash(); return; }
      if (e.key === "ArrowDown") { e.preventDefault(); e.stopPropagation(); slashSel = Math.min(slashSel + 1, slashMatches.length - 1); renderSlashPopup(); return; }
      if (e.key === "ArrowUp") { e.preventDefault(); e.stopPropagation(); slashSel = Math.max(slashSel - 1, 0); renderSlashPopup(); return; }
      if (e.key === "Enter" || e.key === "Tab") { e.preventDefault(); e.stopPropagation(); runSlashItem(slashSel); return; }
    }
    if (wikiOpen && wikiCEBlock === b) {
      if (e.key === "Escape") { e.preventDefault(); e.stopPropagation(); closeWikiPopup(); return; }
      if (e.key === "ArrowDown") { e.preventDefault(); e.stopPropagation(); wikiSel = Math.min(wikiSel + 1, wikiMatches.length - 1); renderWikiPopupCE(); return; }
      if (e.key === "ArrowUp") { e.preventDefault(); e.stopPropagation(); wikiSel = Math.max(wikiSel - 1, 0); renderWikiPopupCE(); return; }
      if (e.key === "Enter" || e.key === "Tab") { e.preventDefault(); e.stopPropagation(); insertWikiLinkCE(wikiSel); return; }
    }
    if ((e.metaKey || e.ctrlKey) && (e.key === "b" || e.key === "i" || (e.shiftKey && e.key.toLowerCase() === "x"))) {
      const wrap = e.key === "b" ? "**" : e.key === "i" ? "*" : "~~";
      e.preventDefault();
      wrapSelectionWith(b, textEl, wrap);
      return;
    }
    handleBlockKeydown(e, b, textEl);
  });

  return container;
}

function makeTableCell(b, r, c, value, isHeader) {
  // the editable text lives in a nested div, not the <td>/<th> itself, so a sibling
  // remove-column button (appended to the cell afterward) never leaks into .textContent
  const cell = document.createElement(isHeader ? "th" : "td");
  const text = document.createElement("div");
  text.className = "cell-text";
  text.contentEditable = "true";
  text.textContent = value;
  text.addEventListener("input", () => {
    if (isHeader) b.header[c] = text.textContent; else b.rows[r][c] = text.textContent;
    syncBody();
  });
  text.addEventListener("keydown", (e) => { if (e.key === "Enter") e.preventDefault(); e.stopPropagation(); });
  cell.appendChild(text);
  return cell;
}

function addTableColumn(b) {
  b.header.push("col " + (b.header.length + 1));
  b.rows.forEach((row) => row.push(""));
  syncBody();
  renderEditorBlocks();
}

function removeTableColumn(b, c) {
  if (b.header.length <= 1) return; // keep at least one column
  b.header.splice(c, 1);
  b.rows.forEach((row) => row.splice(c, 1));
  syncBody();
  renderEditorBlocks();
}

function addTableRow(b) {
  b.rows.push(b.header.map(() => ""));
  syncBody();
  renderEditorBlocks();
}

function removeTableRow(b, r) {
  b.rows.splice(r, 1);
  syncBody();
  renderEditorBlocks();
}

function maybeUpdateTitleFromFirstBlock() {
  if (!active || !blocks.length) return;
  const first = (blocks[0].text || "").trim().slice(0, 40);
  if (first && first !== active.title) { active.title = first; scheduleSave(); }
}

// live markdown-shortcut detection while typing — "# " becomes a heading, "- " a bullet, etc.,
// the same interaction Notion/Obsidian use. Mutates b in place; returns true if the block's
// type changed (caller re-renders + refocuses in that case since the DOM shape changes).
function applyTypeTrigger(b) {
  if (!["p", "ul", "ol", "todo", "quote"].includes(b.type)) return false;
  const t = b.text || "";
  let m;
  if ((m = t.match(/^(#{1,3})\s(.*)$/))) { b.type = "h"; b.level = m[1].length; b.text = m[2]; return true; }
  if ((m = t.match(/^-\s\[([ xX])\]\s(.*)$/))) { b.type = "todo"; b.checked = m[1].toLowerCase() === "x"; b.text = m[2]; return true; }
  if (b.type !== "ul" && (m = t.match(/^-\s(.*)$/))) { b.type = "ul"; b.text = m[1]; return true; }
  if (b.type !== "ol" && (m = t.match(/^\d+\.\s(.*)$/))) { b.type = "ol"; b.text = m[1]; return true; }
  if (b.type !== "quote" && (m = t.match(/^>\s(.*)$/))) { b.type = "quote"; b.text = m[1]; return true; }
  if (b.type === "p" && t === "```") { b.type = "code"; b.text = ""; b.lang = ""; return true; }
  return false;
}

// command-palette-triggered inserts for block types with no natural typing trigger
// (a table/toggle/divider can't be typed one character at a time the way a heading can)
function insertBlockAtEnd(block) {
  if (!active) return;
  blocks.push(block);
  syncBody();
  renderEditorBlocks();
  if (block.type === "table" || block.type === "hr") return; // nothing text-editable to focus
  focusBlock(block.id, 0);
}

function renderEditorBlocks() {
  const host = $("#blockEditor");
  if (!host) return;
  host.innerHTML = "";
  let olN = 0; // same numbering rule as serializeBlocks — consecutive ol blocks count up
  blocks.forEach((b) => {
    olN = b.type === "ol" ? olN + 1 : 0;
    b._n = olN;
    host.appendChild(renderBlockEl(b));
  });
}

function focusBlock(id, caretPos) {
  // synchronous, not requestAnimationFrame-deferred: renderEditorBlocks() has already
  // finished replacing the DOM by the time this runs (both are called back-to-back from
  // handleBlockKeydown), so the target node exists immediately — focus() and caret placement
  // don't need a layout pass first. Deferring here used to leave a one-frame gap between the
  // old block being torn down and the new one gaining focus; keystrokes typed into that gap
  // (fast typing, autocomplete bursts, iPad soft-keyboard) landed nowhere and got silently
  // dropped, corrupting note content.
  const host = $("#blockEditor");
  if (!host) return;
  const el = host.querySelector('[data-id="' + id + '"]');
  if (!el) return;
  let editable = el.matches("[contenteditable]") ? el : el.querySelector("[contenteditable]");
  if (!editable) editable = el.matches("textarea") ? el : el.querySelector("textarea");
  if (!editable) return;
  editable.focus();
  if (editable.tagName === "TEXTAREA") {
    const pos = caretPos == null ? editable.value.length : Math.min(caretPos, editable.value.length);
    editable.setSelectionRange(pos, pos);
  } else {
    setCaretOffset(editable, caretPos == null ? editable.textContent.length : caretPos);
  }
}

function removeBlock(id) {
  const i = blocks.findIndex((b) => b.id === id);
  if (i === -1) return;
  blocks.splice(i, 1);
  if (!blocks.length) blocks.push({ id: uid(), type: "p", text: "" });
  syncBody();
  renderEditorBlocks();
}

/* ---- block operations (shared by the keyboard bar and keyboard shortcuts) ---- */

// the block the toolbar should act on: whatever's focused right now, else the last one touched
function currentBlock() {
  const el = document.activeElement;
  const host = $("#blockEditor");
  if (host && el && host.contains(el)) {
    const wrap = el.closest("[data-id]");
    if (wrap) { const b = blocks.find((x) => x.id === wrap.dataset.id); if (b) return b; }
  }
  return blocks.find((x) => x.id === curBlockId) || blocks[blocks.length - 1] || null;
}

function moveBlockBy(b, dir, caret) {
  const i = blocks.findIndex((x) => x.id === b.id);
  const j = i + dir;
  if (i === -1 || j < 0 || j >= blocks.length) return;
  blocks[i] = blocks[j]; blocks[j] = b; // swap
  syncBody(); renderEditorBlocks(); focusBlock(b.id, caret);
}

function duplicateBlock(b) {
  const i = blocks.findIndex((x) => x.id === b.id);
  if (i === -1) return;
  const copy = JSON.parse(JSON.stringify(b)); // deep copy — tables have nested arrays
  copy.id = uid();
  blocks.splice(i + 1, 0, copy);
  syncBody(); renderEditorBlocks(); focusBlock(copy.id);
}

const TEXT_TYPES = new Set(["p", "h", "ul", "ol", "todo", "quote"]);

// converts the current block to a given type (toolbar/H1-H3 shortcuts). Converting to the
// type it already is toggles back to a plain paragraph — tap H1 twice to undo the H1.
function convertBlockType(b, type, level) {
  if (!b) return;
  if (!TEXT_TYPES.has(b.type) && b.type !== "code") { insertAfterBlock(b, type, level); return; }
  const same = b.type === type && (type !== "h" || b.level === level);
  if (same) { b.type = "p"; delete b.level; }
  else {
    b.type = type;
    if (type === "h") b.level = level;
    if (type === "todo" && b.checked === undefined) b.checked = false;
    b.text = b.text || "";
  }
  const pos = (b.text || "").length;
  syncBody(); renderEditorBlocks(); focusBlock(b.id, pos);
}

// structural types (table/toggle/divider/code) can't convert a text block in place from the
// toolbar without losing text — they insert right after the current block instead
function insertAfterBlock(b, type) {
  const i = b ? blocks.findIndex((x) => x.id === b.id) : blocks.length - 1;
  const nb =
    type === "table" ? { id: uid(), type: "table", header: ["a", "b"], rows: [["", ""]] } :
    type === "toggle" ? { id: uid(), type: "toggle", text: "", body: "" } :
    type === "hr" ? { id: uid(), type: "hr" } :
    type === "code" ? { id: uid(), type: "code", text: "", lang: "" } :
    { id: uid(), type: "p", text: "" };
  blocks.splice(i + 1, 0, nb);
  syncBody(); renderEditorBlocks();
  if (type !== "table" && type !== "hr") focusBlock(nb.id, 0);
}

function indentBlockBy(b, d, caret) {
  if (!b || !["ul", "ol", "todo"].includes(b.type)) return;
  const next = Math.max(0, Math.min(5, (b.indent || 0) + d));
  if (next === (b.indent || 0)) return;
  b.indent = next;
  syncBody(); renderEditorBlocks(); focusBlock(b.id, caret);
}

/* Enter (split) / Backspace-at-start (merge) — the two structural edits every WYSIWYG editor
   has to get right. Everything else is plain browser text editing inside one block. */
function handleBlockKeydown(e, b, el) {
  if (wikiOpen) return; // let the [[ popup's own handler run instead (see checkWikiTriggerCE)
  if (slashOpen) return; // same for the / menu — its handler in the keydown listener runs first

  // Tab / Shift-Tab nest and un-nest list items (bullet, numbered, to-do)
  if (e.key === "Tab" && ["ul", "ol", "todo"].includes(b.type)) {
    e.preventDefault();
    indentBlockBy(b, e.shiftKey ? -1 : 1, getCaretOffset(el));
    return;
  }

  // Alt+↑/↓ moves the whole block up or down — same keys as Notion/VS Code
  if (e.altKey && (e.key === "ArrowUp" || e.key === "ArrowDown")) {
    e.preventDefault();
    moveBlockBy(b, e.key === "ArrowUp" ? -1 : 1, getCaretOffset(el));
    return;
  }

  // Ctrl/Cmd+D duplicates the current block (preventDefault stops the browser's bookmark dialog)
  if ((e.metaKey || e.ctrlKey) && !e.shiftKey && e.key.toLowerCase() === "d") {
    e.preventDefault();
    duplicateBlock(b);
    return;
  }

  // Ctrl/Cmd+Alt+0..3 — paragraph / heading 1-3. e.code because Alt+digit types a
  // special character on macOS, which would make e.key useless here
  if ((e.metaKey || e.ctrlKey) && e.altKey && /^Digit[0-3]$/.test(e.code)) {
    e.preventDefault();
    const n = +e.code.slice(5);
    convertBlockType(b, n === 0 ? "p" : "h", n || undefined);
    return;
  }

  // Ctrl/Cmd+Enter checks / unchecks a to-do from the keyboard
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter" && b.type === "todo") {
    e.preventDefault();
    b.checked = !b.checked;
    syncBody(); renderEditorBlocks(); focusBlock(b.id, getCaretOffset(el));
    return;
  }

  // ↑ at the very start / ↓ at the very end walks into the neighboring block,
  // so arrow keys travel through the whole note instead of stopping at block edges
  if ((e.key === "ArrowUp" || e.key === "ArrowDown") && !e.shiftKey && !e.metaKey && !e.ctrlKey) {
    const pos = getCaretOffset(el);
    const len = (b.text || "").length;
    const i = blocks.findIndex((x) => x.id === b.id);
    if (e.key === "ArrowUp" && pos === 0 && i > 0) {
      e.preventDefault(); focusBlock(blocks[i - 1].id); return;
    }
    if (e.key === "ArrowDown" && pos === len && i < blocks.length - 1) {
      e.preventDefault(); focusBlock(blocks[i + 1].id, 0); return;
    }
  }

  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    const pos = getCaretOffset(el);
    const before = (b.text || "").slice(0, pos);
    const after = (b.text || "").slice(pos);
    const i = blocks.findIndex((x) => x.id === b.id);

    if ((b.type === "ul" || b.type === "ol" || b.type === "todo") && b.text === "") {
      // enter on an empty list item exits the list, like most block editors
      b.type = "p";
      syncBody(); renderEditorBlocks(); focusBlock(b.id, 0);
      return;
    }

    b.text = before;
    const newType = b.type === "ul" || b.type === "ol" || b.type === "todo" ? b.type : "p";
    const next = { id: uid(), type: newType, text: after, indent: b.indent, checked: false };
    blocks.splice(i + 1, 0, next);
    syncBody();
    renderEditorBlocks();
    focusBlock(next.id, 0);
    return;
  }

  if (e.key === "Backspace") {
    const pos = getCaretOffset(el);
    if (pos !== 0) return; // let the browser handle normal in-block deletion
    const i = blocks.findIndex((x) => x.id === b.id);
    if (i === 0) return; // nothing before the first block to merge into
    e.preventDefault();
    const prev = blocks[i - 1];
    if (prev.type === "hr" || prev.type === "code" || prev.type === "table") {
      // don't silently merge text into a structural block — just drop into it instead
      focusBlock(prev.id);
      return;
    }
    const joinAt = (prev.text || "").length;
    prev.text = (prev.text || "") + (b.text || "");
    blocks.splice(i, 1);
    syncBody();
    renderEditorBlocks();
    focusBlock(prev.id, joinAt);
  }
}

/* ---- [[ ]] autocomplete inside a contenteditable block (mirrors checkWikiTrigger for <textarea>) ---- */
function checkWikiTriggerCE(el, b) {
  const caret = getCaretOffset(el);
  const start = findWikiTrigger(b.text || "", caret);
  if (start === -1) { closeWikiPopup(); return; }
  wikiStart = start;
  const query = (b.text || "").slice(start, caret);
  wikiMatches = notes
    .map((n) => ({ n, score: fuzzyScore(query, n.title) }))
    .filter((x) => x.score >= 0)
    .sort((a, b2) => b2.score - a.score)
    .slice(0, 6)
    .map((x) => x.n);
  if (!wikiMatches.length) { closeWikiPopup(); return; }
  wikiOpen = true;
  wikiSel = 0;
  wikiCEBlock = b;
  wikiCEEl = el;
  renderWikiPopupCE();
}

let wikiCEBlock = null, wikiCEEl = null;

function renderWikiPopupCE() {
  let popup = $("#wikiPopup");
  if (!popup) {
    popup = document.createElement("ul");
    popup.id = "wikiPopup";
    popup.className = "wiki-popup";
    $("#main").appendChild(popup);
  }
  popup.innerHTML = wikiMatches
    .map((n, i) => '<li data-i="' + i + '" class="' + (i === wikiSel ? "sel" : "") + '">' + esc(n.title) + "</li>")
    .join("");
  popup.querySelectorAll("li").forEach((li) => {
    li.onmousedown = (e) => { e.preventDefault(); insertWikiLinkCE(parseInt(li.getAttribute("data-i"), 10)); };
  });
}

function insertWikiLinkCE(i) {
  const n = wikiMatches[i];
  if (!n || !wikiCEBlock || !wikiCEEl) return;
  const caret = getCaretOffset(wikiCEEl);
  const text = wikiCEBlock.text || "";
  const before = text.slice(0, wikiStart);
  const after = text.slice(caret);
  const insertion = n.title + "]]";
  wikiCEBlock.text = before + insertion + after;
  wikiCEEl.textContent = wikiCEBlock.text;
  syncBody();
  closeWikiPopup();
  wikiCEEl.focus();
  setCaretOffset(wikiCEEl, wikiStart + insertion.length);
}

/* ---- "/" slash menu — Notion's signature interaction ----
   Typing "/" at the start of any text block opens a block-type menu; keep typing to filter
   ("/tab" → table), Enter/Tab/click to apply. Three shapes of command:
   - apply: converts the current block in place (headings, lists, quote…)
   - replace: swaps the current block for a structural one (table, toggle, divider)
   - replaceMany: swaps it for several blocks (the generated month calendar) */
let slashOpen = false, slashMatches = [], slashSel = 0, slashBlock = null, slashEl = null;

const SLASH_ITEMS = [
  { label: "text", apply: (b) => { b.type = "p"; delete b.level; } },
  { label: "heading 1", apply: (b) => { b.type = "h"; b.level = 1; } },
  { label: "heading 2", apply: (b) => { b.type = "h"; b.level = 2; } },
  { label: "heading 3", apply: (b) => { b.type = "h"; b.level = 3; } },
  { label: "bullet list", apply: (b) => { b.type = "ul"; } },
  { label: "numbered list", apply: (b) => { b.type = "ol"; } },
  { label: "to-do list", apply: (b) => { b.type = "todo"; b.checked = false; } },
  { label: "quote", apply: (b) => { b.type = "quote"; } },
  { label: "code block", apply: (b) => { b.type = "code"; b.lang = ""; } },
  { label: "divider", replace: () => ({ id: uid(), type: "hr" }) },
  { label: "table", replace: () => ({ id: uid(), type: "table", header: ["a", "b"], rows: [["", ""]] }) },
  { label: "toggle", replace: () => ({ id: uid(), type: "toggle", text: "", body: "" }) },
  { label: "calendar (this month)", replaceMany: () => parseBlocks(monthCalendarMarkdown()) },
  { label: "today's date", apply: (b) => { b.type = "p"; b.text = todayStr(); } },
];

function checkSlashTrigger(el, b) {
  const t = b.text || "";
  if (!TEXT_TYPES.has(b.type) || !t.startsWith("/")) { closeSlash(); return; }
  const q = t.slice(1);
  slashMatches = SLASH_ITEMS
    .map((it) => ({ it, score: q ? fuzzyScore(q, it.label) : 0 }))
    .filter((x) => x.score >= 0)
    .sort((a, b2) => b2.score - a.score)
    .map((x) => x.it);
  if (!slashMatches.length) { closeSlash(); return; }
  slashOpen = true; slashSel = 0; slashBlock = b; slashEl = el;
  renderSlashPopup();
}

function renderSlashPopup() {
  let popup = $("#slashPopup");
  if (!popup) {
    popup = document.createElement("ul");
    popup.id = "slashPopup";
    popup.className = "wiki-popup"; // same look/position as the [[ autocomplete
    $("#main").appendChild(popup);
  }
  popup.innerHTML = slashMatches
    .map((it, i) => '<li data-i="' + i + '" class="' + (i === slashSel ? "sel" : "") + '">' + esc(it.label) + "</li>")
    .join("");
  popup.querySelectorAll("li").forEach((li) => {
    li.onmousedown = (e) => { e.preventDefault(); runSlashItem(parseInt(li.getAttribute("data-i"), 10)); };
  });
}

function closeSlash() {
  slashOpen = false; slashBlock = null; slashEl = null;
  const popup = $("#slashPopup");
  if (popup) popup.remove();
}

function runSlashItem(i) {
  const item = slashMatches[i];
  const b = slashBlock;
  closeSlash();
  if (!item || !b) return;
  const idx = blocks.findIndex((x) => x.id === b.id);
  if (idx === -1) return;
  b.text = ""; // eat the "/query" text — it was a command, not content
  if (item.replaceMany) {
    blocks.splice(idx, 1, ...item.replaceMany());
    syncBody(); renderEditorBlocks();
  } else if (item.replace) {
    const nb = item.replace();
    blocks.splice(idx, 1, nb);
    syncBody(); renderEditorBlocks();
    if (nb.type === "toggle") focusBlock(nb.id, 0);
  } else {
    item.apply(b);
    syncBody(); renderEditorBlocks(); focusBlock(b.id, (b.text || "").length);
  }
}

/* ---- render: main ---- */
function renderMain() {
  const main = $("#main");
  if (localFile) { renderLocalFileView(); return; }
  if (!active) {
    // empty state doubles as a template picker — a first note shouldn't start from nothing
    main.innerHTML = '<div class="empty"><p>no note open.</p><button class="ghost" id="emptyNew">+ new note</button>' +
      TEMPLATES.slice(0, 4).map((t, i) => '<button class="ghost sm" data-tpl="' + i + '">+ ' + esc(t.name) + '</button>').join("") +
      '</div>';
    $("#emptyNew").onclick = () => newNote();
    main.querySelectorAll("[data-tpl]").forEach((btn) => {
      btn.onclick = () => newNote(null, TEMPLATES[+btn.getAttribute("data-tpl")]);
    });
    return;
  }
  if (mode === "draw" && !blockEditorEnabled()) {
    // legacy draw view — only for the plain-textarea editor. The block editor gets the
    // unified surface below where text and ink share one canvas.
    main.innerHTML =
      '<div class="drawwrap" id="drawwrap"><div class="drawbar">' + drawbarHtml() +
      // base canvas (#cv) holds all committed strokes; live canvas (#cvlive) holds only the stroke being drawn right now
      // splitting them means we never redraw old strokes while the pen is moving — massive latency reduction
      '</div><div class="canvas-scroll"><div class="canvas-wrap" id="cvwrap"><canvas class="canvas" id="cv"></canvas><canvas class="cv-live" id="cvlive"></canvas></div></div></div>';
    buildDrawControls();
    const legacyScroll = $(".canvas-scroll");
    legacyScroll.addEventListener("pointerdown", down);
    legacyScroll.addEventListener("pointermove", move);
    legacyScroll.addEventListener("pointerup", up);
    legacyScroll.addEventListener("pointerleave", up);
    legacyScroll.addEventListener("pointercancel", up);
    requestAnimationFrame(setupCanvas);
  } else if (blockEditorEnabled()) {
    // ONE surface for text and ink: #blockEditor and the two canvases are siblings inside
    // .note-surface, scrolled together by .note-scroll. Insert and draw are just input modes
    // over the same canvas — switching between them toggles CSS classes (see applyModeUI),
    // it never rebuilds this DOM, so the pencil can start drawing mid-gesture with no rebuild.
    main.innerHTML =
      '<div class="drawbar" id="drawbar" hidden>' + drawbarHtml() + '</div>' +
      '<div class="note-scroll" id="noteScroll"><div class="note-surface" id="noteSurface">' +
        '<div id="blockEditor"></div>' +
        '<canvas class="ink" id="cv"></canvas><canvas class="ink" id="cvlive"></canvas>' +
      '</div></div>' +
      '<div class="kbar" id="kbar"></div>' +
      '<div class="backlinks" id="backlinksPanel" hidden></div>';
    blocks = parseBlocks(active.body);
    renderEditorBlocks();
    buildKbar();
    buildDrawControls();
    // pointer handlers live on the scroller permanently, in every mode — down() decides what a
    // pointer means: pen in text mode flips to draw and starts the stroke, fingers scroll, etc.
    const scroll = $("#noteScroll");
    scroll.addEventListener("pointerdown", down);
    scroll.addEventListener("pointermove", move);
    scroll.addEventListener("pointerup", up);
    scroll.addEventListener("pointerleave", up);
    scroll.addEventListener("pointercancel", up);
    applyModeUI();
    renderBacklinksPanel();
    requestAnimationFrame(sizeInkCanvas);
    // only auto-focus for a genuinely empty (freshly created) note, ready to type into immediately —
    // auto-focusing an EXISTING note's first block put it into raw-text edit mode on open, which meant
    // any [[link]] sitting in that first line rendered as plain unclickable text until you clicked
    // away first. Existing notes now open fully rendered (links clickable); a single click into any
    // block starts typing there just fine on its own (see the focusin handler further down).
    if (mode === "insert" && !active.body.trim()) focusBlock(blocks[0].id, 0);
  } else {
    // plain textarea filling the main area — simplest setup so Android tap-to-focus works
    main.innerHTML =
      '<textarea class="editor" id="ed" spellcheck="false" placeholder="# start writing\u2026"></textarea>' +
      '<div class="backlinks" id="backlinksPanel" hidden></div>';
    renderBacklinksPanel(); // repaint from already-fetched data (e.g. after a re-render mid-poll)
    const ed = $("#ed");
    ed.value = active.body;

    ed.addEventListener("input", () => { active.body = ed.value; lastTyped = Date.now(); scheduleSave(); checkWikiTrigger(ed); });

    ed.addEventListener("blur", () => {
      const first = (active.body.split("\n")[0] || "").replace(/^#+\s*/, "").trim().slice(0, 40);
      if (first && first !== active.title) { active.title = first; scheduleSave(); }
      closeWikiPopup();
    });

    // handled on the element itself (fires before the window-level listener) so the
    // wiki popup can eat Escape/Arrow/Enter without triggering global shortcuts underneath it
    ed.addEventListener("keydown", (e) => {
      if (!wikiOpen) return;
      if (e.key === "Escape") { e.stopPropagation(); closeWikiPopup(); }
      else if (e.key === "ArrowDown") { e.preventDefault(); e.stopPropagation(); wikiSel = Math.min(wikiSel + 1, wikiMatches.length - 1); paintWikiSelection(); }
      else if (e.key === "ArrowUp") { e.preventDefault(); e.stopPropagation(); wikiSel = Math.max(wikiSel - 1, 0); paintWikiSelection(); }
      else if (e.key === "Enter" || e.key === "Tab") { e.preventDefault(); e.stopPropagation(); insertWikiLink(ed, wikiSel); }
    });

    // update mode when textarea is focused — defer DOM changes so they don't block the keyboard on Android
    ed.addEventListener("focus", () => {
      if (mode !== "insert") {
        mode = "insert";
        setTimeout(() => { renderBar(); renderStatus(); }, 100);
      }
    });

    if (mode === "insert") focusEditor();
  }
}

function focusEditor() { const ed = $("#ed"); if (ed) ed.focus(); }

/* ---- mode switching ----
   On the unified surface, insert<->draw is just CSS class + toolbar visibility toggles —
   no re-render, no new canvas, no lost scroll position. Everything that used to write
   `mode = ...; renderMain(); ...` goes through here now. */
function setMode(m) {
  mode = m;
  if ($("#noteScroll") && active && !localFile) {
    applyModeUI();
    if (m === "draw") sizeInkCanvas(); // content may have grown since last draw session
  } else {
    renderMain();
    if (m === "insert") focusEditor();
  }
  renderBar(); renderStatus();
}

function applyModeUI() {
  const scroll = $("#noteScroll");
  if (!scroll) return;
  const drawOn = mode === "draw";
  scroll.classList.toggle("draw-on", drawOn);
  const db = $("#drawbar"); if (db) db.hidden = !drawOn;
  const kb = $("#kbar"); if (kb) { kb.hidden = drawOn; positionKbar(); }
}

// shared by the unified drawbar and the legacy textarea draw view
function drawbarHtml() {
  return '<div class="swatches" id="sw"></div>' +
    '<div class="sizes" id="sz"></div>' +
    '<div class="spacer"></div>' +
    '<button class="toggle ' + (markerOn ? "on" : "") + '" id="marker" title="Translucent highlighter strokes">marker ' + (markerOn ? "on" : "off") + '</button>' +
    '<button class="toggle ' + (erasing ? "on" : "") + '" id="eraser">eraser ' + (erasing ? "on" : "off") + '</button>' +
    '<button class="toggle ' + (penOnly ? "on" : "") + '" id="penonly" title="Ignore finger and palm, pencil only">pen-only ' + (penOnly ? "on" : "off") + '</button>' +
    '<button class="ghost sm" id="undo">undo</button>' +
    '<button class="ghost sm" id="redoInk">redo</button>' +
    '<button class="ghost sm" id="clear">clear</button>' +
    '<button class="ghost sm" id="drawDone" title="Back to writing">done</button>';
}

/* ---- keyboard bar ----
   The row of block/formatting buttons every serious mobile editor has above the keyboard.
   Buttons are declared as data; mousedown-preventDefault keeps the focused block focused
   (so the button knows what to act on), and every action refocuses afterward so the
   on-screen keyboard never collapses mid-edit. */
const KBAR_ITEMS = [
  { t: "H1", title: "heading 1", run: () => convertBlockType(currentBlock(), "h", 1) },
  { t: "H2", title: "heading 2", run: () => convertBlockType(currentBlock(), "h", 2) },
  { t: "H3", title: "heading 3", run: () => convertBlockType(currentBlock(), "h", 3) },
  { div: true },
  { t: "&bull;", title: "bullet list", run: () => convertBlockType(currentBlock(), "ul") },
  { t: "1.", title: "numbered list", run: () => convertBlockType(currentBlock(), "ol") },
  { t: "&#9745;", title: "to-do checkbox", run: () => convertBlockType(currentBlock(), "todo") },
  { t: "&#10077;", title: "quote", run: () => convertBlockType(currentBlock(), "quote") },
  { div: true },
  { t: "&#9638;", title: "insert table", run: () => insertAfterBlock(currentBlock(), "table") },
  { t: "&#9656;", title: "insert toggle", run: () => insertAfterBlock(currentBlock(), "toggle") },
  { t: "&lt;/&gt;", title: "insert code block", run: () => insertAfterBlock(currentBlock(), "code") },
  { t: "&#8213;", title: "insert divider", run: () => insertAfterBlock(currentBlock(), "hr") },
  { div: true },
  { t: "<b>B</b>", title: "bold (select text first) — Ctrl+B", run: () => kbarWrap("**") },
  { t: "<i>I</i>", title: "italic — Ctrl+I", run: () => kbarWrap("*") },
  { t: "<s>S</s>", title: "strikethrough — Ctrl+Shift+X", run: () => kbarWrap("~~") },
  { t: "`", title: "inline code", run: () => kbarWrap("`") },
  { t: "[[", title: "link to another note", run: () => kbarInsertWiki() },
  { div: true },
  { t: "&#8676;", title: "outdent (Shift+Tab)", run: () => { const b = currentBlock(); if (b) indentBlockBy(b, -1); } },
  { t: "&#8677;", title: "indent (Tab)", run: () => { const b = currentBlock(); if (b) indentBlockBy(b, 1); } },
  { t: "&#8593;", title: "move block up (Alt+↑)", run: () => { const b = currentBlock(); if (b) moveBlockBy(b, -1); } },
  { t: "&#8595;", title: "move block down (Alt+↓)", run: () => { const b = currentBlock(); if (b) moveBlockBy(b, 1); } },
  { t: "&#10697;", title: "duplicate block (Ctrl+D)", run: () => { const b = currentBlock(); if (b) duplicateBlock(b); } },
  { t: "&#10005;", title: "delete block", run: () => { const b = currentBlock(); if (b) { removeBlock(b.id); curBlockId = null; } } },
  { div: true },
  { t: "&#8630;", title: "undo (Ctrl+Z)", run: () => doUndo() },
  { t: "&#8631;", title: "redo (Ctrl+Shift+Z)", run: () => doRedo() },
];

function buildKbar() {
  const kb = $("#kbar");
  if (!kb) return;
  kb.innerHTML = KBAR_ITEMS.map((it, i) =>
    it.div ? '<span class="kdiv"></span>' :
    '<button data-k="' + i + '" title="' + esc(it.title) + '">' + it.t + '</button>').join("");
  // mousedown preventDefault = the tap never steals focus from the block being edited
  kb.addEventListener("mousedown", (e) => e.preventDefault());
  kb.querySelectorAll("button[data-k]").forEach((btn) => {
    btn.onclick = () => { const it = KBAR_ITEMS[+btn.getAttribute("data-k")]; if (it) it.run(); };
  });
}

// bold/italic/etc from the toolbar — needs a live selection inside a focused block
function kbarWrap(wrap) {
  const el = document.activeElement;
  const host = $("#blockEditor");
  if (!host || !el || !host.contains(el) || !el.isContentEditable) return;
  const b = currentBlock();
  if (b && TEXT_TYPES.has(b.type)) wrapSelectionWith(b, el, wrap);
}

// appends "[[" to the current block and opens the note autocomplete right away
function kbarInsertWiki() {
  const b = currentBlock();
  if (!b || !TEXT_TYPES.has(b.type)) return;
  b.text = (b.text || "") + "[[";
  syncBody(); renderEditorBlocks(); focusBlock(b.id, b.text.length);
  const host = $("#blockEditor");
  const wrapEl = host && host.querySelector('[data-id="' + b.id + '"]');
  const el = wrapEl && (wrapEl.matches("[contenteditable]") ? wrapEl : wrapEl.querySelector("[contenteditable]"));
  if (el) checkWikiTriggerCE(el, b);
}

// floats the kbar on top of the on-screen keyboard. The visualViewport API reports the
// visible area minus the keyboard; the gap between it and the layout viewport IS the
// keyboard height, so translating the bar up by that much parks it right on top of it.
function positionKbar() {
  const kb = $("#kbar");
  if (!kb || kb.hidden) return;
  const vv = window.visualViewport;
  if (!vv) return;
  const inset = window.innerHeight - vv.height - vv.offsetTop;
  if (inset > 60) { kb.classList.add("floating"); kb.style.transform = "translateY(" + (-inset) + "px)"; }
  else { kb.classList.remove("floating"); kb.style.transform = ""; }
}
if (window.visualViewport) {
  window.visualViewport.addEventListener("resize", positionKbar);
  window.visualViewport.addEventListener("scroll", positionKbar);
}

/* ---- ink canvas sizing (unified surface) ----
   The canvases must cover everything: the visible viewport, all the text, and every stroke
   already drawn (plus room below to keep drawing). Resizing a canvas wipes it, so redraw() runs
   after — which is why syncBody debounces this instead of calling it per keystroke. */
function sizeInkCanvas() {
  const cv = $("#cv"), cvlive = $("#cvlive"), surface = $("#noteSurface"), scroll = $("#noteScroll");
  if (!cv || !surface || !scroll) return;
  const dpr = window.devicePixelRatio || 1;
  const W = scroll.clientWidth;
  let maxY = 0;
  for (const s of (active && active.strokes) || []) {
    for (const p of s.points || []) if (p.y > maxY) maxY = p.y;
  }
  const editorH = $("#blockEditor") ? $("#blockEditor").scrollHeight : 0;
  const H = Math.max(scroll.clientHeight, editorH, maxY + 500, 1400);
  surface.style.minHeight = H + "px"; // give the scroller real drawing room below the text
  for (const c of [cv, cvlive]) {
    if (c.width === Math.round(W * dpr) && c.height === Math.round(H * dpr)) continue;
    c.style.width = W + "px";
    c.style.height = H + "px";
    c.width = Math.round(W * dpr);
    c.height = Math.round(H * dpr);
    const ctx = c.getContext("2d");
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0); // 1 unit = 1 CSS pixel on retina
    ctx.lineCap = "round"; ctx.lineJoin = "round";
  }
  redraw();
}

/* ---- ink undo/redo ---- */
function undoStroke() {
  if (!active || !(active.strokes || []).length) return;
  strokeRedo.push(active.strokes.pop());
  redraw(); scheduleSave();
}
function redoStroke() {
  if (!active || !strokeRedo.length) return;
  active.strokes.push(strokeRedo.pop());
  redraw(); scheduleSave();
}

function buildDrawControls() {
  $("#sw").innerHTML = PENS.map((p, i) =>
    '<button class="sw ' + (i === penIdx ? "on" : "") + '" data-i="' + i + '" style="background:' + p.c + '" title="' + p.name + '" aria-label="' + p.name + '"></button>').join("");
  renderSizes(); // draws pen or eraser sizes depending on current mode
  $("#sw").querySelectorAll(".sw").forEach((el) => {
    el.onclick = () => {
      penIdx = +el.getAttribute("data-i");
      erasing = false; // picking a colour automatically turns eraser off
      updateEraser();
      $("#sw").querySelectorAll(".sw").forEach((x, j) => x.classList.toggle("on", j === penIdx));
    };
  });
  // marker and eraser are mutually exclusive — turning one on turns the other off
  $("#marker").onclick = () => { markerOn = !markerOn; if (markerOn) erasing = false; updateEraser(); updateMarker(); };
  $("#eraser").onclick = () => { erasing = !erasing; if (erasing) markerOn = false; updateEraser(); updateMarker(); };
  $("#penonly").onclick = () => { setPenOnly(!penOnly); updatePenOnly(); };
  $("#undo").onclick = undoStroke;
  $("#redoInk").onclick = redoStroke;
  // wiping every stroke is the one draw action you can't undo one step at a time — confirm it
  $("#clear").onclick = () => {
    if (!active || !(active.strokes || []).length) return;
    if (confirm("erase all ink on this note?")) { active.strokes = []; strokeRedo = []; redraw(); scheduleSave(); }
  };
  $("#drawDone").onclick = () => setMode("insert");
  updatePenOnly();
}

function updateMarker() {
  const b = $("#marker"); if (!b) return;
  b.classList.toggle("on", markerOn);
  b.textContent = "marker " + (markerOn ? "on" : "off");
}

function updatePenOnly() {
  const b = $("#penonly"); if (!b) return;
  b.classList.toggle("on", penOnly);
  b.textContent = "pen-only " + (penOnly ? "on" : "off");
  updateTouchAction();
}

function updateTouchAction() {
  // touch-action is always "none" (set in CSS) — we handle everything in JS
  // finger scrolling is done manually in move() so the pen never triggers scroll
}

function updateEraser() {
  const b = $("#eraser"); if (!b) return;
  b.classList.toggle("on", erasing); // green when on, grey when off
  b.textContent = "eraser " + (erasing ? "on" : "off");
  renderSizes(); // swap in the right size buttons for the current mode
}

// renders pen sizes or eraser sizes into the #sz div depending on which mode is active
function renderSizes() {
  const sz = $("#sz"); if (!sz) return;
  if (erasing) {
    // show eraser sizes: sm / md / lg
    sz.innerHTML = ERASER_SIZES.map((s, i) =>
      '<button class="szbtn ' + (i === eraserSizeIdx ? "on" : "") + '" data-ei="' + i + '">' + s.l + '</button>').join("");
    sz.querySelectorAll(".szbtn").forEach((el) => {
      el.onclick = () => { eraserSizeIdx = +el.getAttribute("data-ei"); sz.querySelectorAll(".szbtn").forEach((x, j) => x.classList.toggle("on", j === eraserSizeIdx)); };
    });
  } else {
    // show pen sizes: fine / med / bold
    sz.innerHTML = SIZES.map((s, i) =>
      '<button class="szbtn ' + (i === sizeIdx ? "on" : "") + '" data-i="' + i + '">' + s.l + '</button>').join("");
    sz.querySelectorAll(".szbtn").forEach((el) => {
      el.onclick = () => { sizeIdx = +el.getAttribute("data-i"); sz.querySelectorAll(".szbtn").forEach((x, j) => x.classList.toggle("on", j === sizeIdx)); };
    });
  }
}

/* ---- canvas ---- */
function setupCanvas() {
  const cv = $("#cv"), cvlive = $("#cvlive"); if (!cv) return;
  const scroll = cv.closest(".canvas-scroll");
  const dpr = window.devicePixelRatio || 1;
  const W = scroll ? scroll.clientWidth : window.innerWidth;
  const H = 2200;
  // size both canvases identically — they sit on top of each other inside .canvas-wrap
  for (const c of [cv, cvlive]) {
    c.style.width  = W + "px";
    c.style.height = H + "px";
    c.width  = Math.round(W * dpr);
    c.height = Math.round(H * dpr);
    const ctx = c.getContext("2d");
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0); // 1 unit = 1 CSS pixel on retina
    ctx.lineCap = "round"; ctx.lineJoin = "round";
  }
  // give canvas-wrap an explicit size so the scroll container knows how tall the content is
  const wrap = $("#cvwrap");
  if (wrap) { wrap.style.width = W + "px"; wrap.style.height = H + "px"; }
  redraw();
}

// draws a single stroke object onto any canvas context using bezier smoothing
function drawStroke(ctx, s) {
  const pts = s.points;
  if (!pts || !pts.length) return;
  ctx.globalAlpha = s.hl ? 0.35 : 1; // marker strokes are translucent so text shows through
  ctx.globalCompositeOperation = s.erase ? "destination-out" : "source-over";
  ctx.strokeStyle = s.erase ? "rgba(0,0,0,1)" : s.color;
  ctx.fillStyle   = s.erase ? "rgba(0,0,0,1)" : s.color;
  if (pts.length === 1) {
    ctx.beginPath();
    ctx.arc(pts[0].x, pts[0].y, (s.size * (0.5 + pts[0].p)) / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalCompositeOperation = "source-over";
    ctx.globalAlpha = 1;
    return;
  }
  for (let i = 1; i < pts.length; i++) {
    const a = pts[i - 1], b = pts[i];
    const sx = i === 1 ? a.x : (pts[i - 2].x + a.x) / 2;
    const sy = i === 1 ? a.y : (pts[i - 2].y + a.y) / 2;
    const ex = (a.x + b.x) / 2, ey = (a.y + b.y) / 2;
    ctx.lineWidth = s.size * (0.45 + 0.9 * ((a.p + b.p) / 2));
    ctx.beginPath(); ctx.moveTo(sx, sy);
    ctx.quadraticCurveTo(a.x, a.y, ex, ey);
    ctx.stroke();
  }
  const last = pts[pts.length - 1], prev = pts[pts.length - 2];
  ctx.lineWidth = s.size * (0.45 + 0.9 * last.p);
  ctx.beginPath();
  ctx.moveTo((prev.x + last.x) / 2, (prev.y + last.y) / 2);
  ctx.lineTo(last.x, last.y);
  ctx.stroke();
  ctx.globalCompositeOperation = "source-over";
  ctx.globalAlpha = 1;
}

// redraws ALL committed strokes onto the base canvas — called on load, undo, clear, and stroke commit
// never called while the pen is moving so it doesn't matter how slow it is
function redraw() {
  const cv = $("#cv"); if (!cv) return;
  const ctx = cv.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  ctx.clearRect(0, 0, cv.width / dpr, cv.height / dpr);
  for (const s of (active ? active.strokes || [] : [])) drawStroke(ctx, s);
}

// draws only the current live stroke onto the top canvas — called on every pointer move via rAF
// because the base canvas is untouched, this is cheap regardless of how many strokes exist
function drawLive() {
  liveRaf = null;
  const cvlive = $("#cvlive"); if (!cvlive) return;
  const ctx = cvlive.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  ctx.clearRect(0, 0, cvlive.width / dpr, cvlive.height / dpr);
  if (cur) drawStroke(ctx, cur);
}

function clearLive() {
  const cvlive = $("#cvlive"); if (!cvlive) return;
  const ctx = cvlive.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  ctx.clearRect(0, 0, cvlive.width / dpr, cvlive.height / dpr);
}

function ptFrom(e) {
  const rect = $("#cv").getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top, p: (e.pressure && e.pressure > 0) ? e.pressure : 0.5 };
}
const blocked = (e) => penOnly && e.pointerType === "touch";

function down(e) {
  if (mode !== "draw") {
    // pencil touching the note while writing = start drawing, right now, no menu digging:
    // flip to draw mode (toolbar included) and fall through so THIS tap already draws.
    // preventDefault stops the tap from also focusing a text block underneath.
    if (e.pointerType === "pen" && $("#noteScroll") && active && !localFile) {
      e.preventDefault();
      setMode("draw");
    } else return; // fingers/mouse in text mode: normal scrolling, tapping, selecting
  }
  if (e.pointerType === "pen" && !penSeen) { penSeen = true; setPenOnly(true); updatePenOnly(); }
  if (blocked(e)) {
    // preventDefault even though we're not drawing — a finger/palm held still (not dragging) is
    // exactly a long-press to iOS, and without this it fires the native Copy/Share/Look Up callout
    // over the canvas regardless of touch-action, since that's a separate gesture recognizer
    e.preventDefault();
    // finger down → stop any existing momentum and start fresh scroll tracking
    if (scrollRaf) { cancelAnimationFrame(scrollRaf); scrollRaf = null; }
    fingerY = e.clientY;
    scrollVel = 0;
    scrollEl = document.querySelector(".canvas-scroll") || $("#noteScroll"); // legacy view or unified surface
    return;
  }
  e.preventDefault();
  $("#cv").setPointerCapture(e.pointerId);
  drawing = true;
  // pick size from eraser sizes or pen sizes depending on current mode;
  // marker strokes go extra wide (real highlighters are fat) and render translucent
  const strokeSize = erasing ? ERASER_SIZES[eraserSizeIdx].v : (markerOn ? SIZES[sizeIdx].v * 3.2 : SIZES[sizeIdx].v);
  cur = { erase: erasing, hl: !erasing && markerOn, color: PENS[penIdx].c, size: strokeSize, points: [ptFrom(e)] };
  clearLive(); // start the live canvas fresh for this stroke
}
function move(e) {
  if (mode !== "draw" && !drawing) return; // unified surface: text mode is none of our business
  if (blocked(e)) {
    e.preventDefault();
    if (fingerY !== null && scrollEl) {
      scrollVel = fingerY - e.clientY;
      scrollEl.scrollTop += scrollVel;
      fingerY = e.clientY;
    }
    return;
  }
  if (!drawing) return;
  e.preventDefault();
  const evs = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
  const rect = $("#cv").getBoundingClientRect();
  for (const ev of evs) {
    // raw point — no smoothing here, bezier curves in drawStroke handle visual smoothness without adding lag
    cur.points.push({ x: ev.clientX - rect.left, y: ev.clientY - rect.top, p: (ev.pressure && ev.pressure > 0) ? ev.pressure : 0.5 });
  }
  // schedule one draw per display frame — if move fires faster than the screen refreshes, extra events are batched
  if (!liveRaf) liveRaf = requestAnimationFrame(drawLive);
}
function momentum() {
  if (!scrollEl || Math.abs(scrollVel) < 0.5) { scrollVel = 0; return; }
  scrollEl.scrollTop += scrollVel;
  scrollVel *= 0.88; // decay — 0.88 gives a natural glide that stops in about half a second
  scrollRaf = requestAnimationFrame(momentum);
}

function up() {
  if (fingerY !== null) {
    fingerY = null;
    if (Math.abs(scrollVel) > 1) scrollRaf = requestAnimationFrame(momentum); // kick off momentum glide
    return;
  }
  if (!drawing) return;
  drawing = false;
  if (liveRaf) { cancelAnimationFrame(liveRaf); liveRaf = null; }
  if (cur && cur.points.length) {
    active.strokes = (active.strokes || []).concat([cur]);
    strokeRedo = []; // a fresh stroke invalidates the redo branch, same rule as text undo
    scheduleSave();
  }
  cur = null;
  redraw();    // bake the committed stroke into the base canvas
  clearLive(); // wipe the live canvas — stroke is now on the base
}

window.addEventListener("resize", () => { if ($("#noteScroll")) sizeInkCanvas(); else if (mode === "draw") setupCanvas(); });
window.addEventListener("orientationchange", () => { setTimeout(() => { if ($("#noteScroll")) sizeInkCanvas(); else if (mode === "draw") setupCanvas(); }, 200); });

/* ---- render: statusline ---- */
function renderStatus() {
  const meta = { normal: ["NORMAL", "m-normal"], insert: ["INSERT", "m-insert"], draw: ["DRAW", "m-draw"] }[mode];
  const words = active && active.body.trim() ? active.body.trim().split(/\s+/).length : 0;
  const chars = active ? active.body.length : 0;
  // to-do progress for the open note \u2014 count "- [ ]" / "- [x]" lines straight off the markdown
  const todoTotal = active ? (active.body.match(/^\s*- \[[ xX]\]/gm) || []).length : 0;
  const todoDone = active ? (active.body.match(/^\s*- \[[xX]\]/gm) || []).length : 0;
  let right;
  if (mode === "draw") {
    const tool = erasing ? "eraser" : markerOn ? "marker" : SIZES[sizeIdx].l;
    right = '<span class="seg dim hide-sm">' + PENS[penIdx].name + " \u00B7 " + tool + '</span>';
  } else {
    right = '<span class="seg dim hide-sm">' + words + "w " + chars + "c" +
      (todoTotal ? " \u00B7 " + todoDone + "/" + todoTotal + " \u2713" : "") + '</span>';
  }
  let sync;
  if (!online) sync = '<span class="led led-y"></span> offline';
  else if (saveStatus === "saving") sync = '<span class="led led-y"></span> saving';
  else if (saveStatus === "error") sync = '<span class="led led-r"></span> save failed';
  else sync = '<span class="led led-g"></span> synced';
  $("#status").innerHTML =
    '<span class="mode ' + meta[1] + '">' + meta[0] + '</span>' +
    '<span class="seg fname">' + (active ? esc(active.title) : "no file") + '</span>' +
    '<span class="seg dim hide-sm">' + notes.length + ' notes</span>' +
    '<div class="spacer"></div>' + right +
    '<span class="seg sync">' + sync + '</span>' +
    '<span class="cursor">\u2588</span>';
}

/* ---- keyboard (NORMAL-mode shortcuts) ---- */
window.addEventListener("keydown", (e) => {
  const el = document.activeElement;
  // block editor text blocks are contenteditable divs/spans, not TEXTAREA/INPUT — without this,
  // single-letter shortcuts below (i/d/o) would steal keystrokes typed into a block whenever mode
  // hadn't already flipped to "insert" (e.g. clicking straight into a block instead of pressing i first)
  const typing = el && (el.tagName === "TEXTAREA" || el.tagName === "INPUT" || el.isContentEditable);

  // command palette — works everywhere, even mid-typing, like Cmd/Ctrl-K in most editors
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") { e.preventDefault(); openPalette(); return; }

  // Ctrl/Cmd-S flushes the pending autosave immediately (muscle memory deserves to work)
  if ((e.metaKey || e.ctrlKey) && !e.shiftKey && e.key.toLowerCase() === "s") {
    e.preventDefault(); if (active) { lcSaveNote(active); lcMarkPending(active.id); saveNow(); } return;
  }

  // Ctrl/Cmd-E toggles between writing and drawing on the shared canvas
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "e") {
    e.preventDefault(); if (active) setMode(mode === "draw" ? "insert" : "draw"); return;
  }

  // Ctrl/Cmd-Z / Ctrl/Cmd-Shift-Z (or Ctrl-Y): our own undo/redo. In draw mode it walks
  // strokes; in text mode it walks body snapshots. Plain textareas (code blocks, legacy
  // editor) keep the browser's native undo — those either stopPropagation before this runs
  // or get skipped here explicitly.
  if ((e.metaKey || e.ctrlKey) && (e.key.toLowerCase() === "z" || e.key.toLowerCase() === "y")) {
    if (el && el.tagName === "TEXTAREA") return; // native textarea undo is better — leave it alone
    e.preventDefault();
    const redo = e.key.toLowerCase() === "y" || e.shiftKey;
    if (mode === "draw") { redo ? redoStroke() : undoStroke(); }
    else { redo ? doRedo() : doUndo(); }
    return;
  }

  if (e.key === "Escape") {
    const dropdown = $("#paletteDropdown");
    if (dropdown && !dropdown.hidden) { closePalette(); const si = $("#searchBarInput"); if (si) si.blur(); return; }
    const scrim = $("#modalScrim");
    if (scrim && !scrim.hidden) { closeModal(); return; }
    const blockHost = $("#blockEditor");
    if (blockHost && blockHost.contains(document.activeElement)) document.activeElement.blur();
    const ed = $("#ed"); if (ed) ed.blur();
    setMode("normal"); return;
  }
  // single-letter shortcuts only bail while actually typing somewhere — being "in insert
  // mode" with nothing focused (tapped out of a block) shouldn't kill the whole keymap
  if (typing || e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.key === "i" && active) { e.preventDefault(); setMode("insert"); }
  else if (e.key === "d" && active) { e.preventDefault(); setMode("draw"); }
  else if (e.key === "o") { e.preventDefault(); newNote(); }
  else if (e.key === "?") { e.preventDefault(); openShortcutHelp(); }
});

/* ---- keyboard shortcuts help ("?" or via palette) ---- */
function openShortcutHelp() {
  const rows = [
    ["Ctrl/Cmd K", "search notes + commands"],
    ["Ctrl/Cmd Z", "undo (text or ink)"],
    ["Ctrl/Cmd Shift Z", "redo"],
    ["Ctrl/Cmd S", "save now"],
    ["Ctrl/Cmd E", "toggle draw / write"],
    ["Ctrl/Cmd B / I", "bold / italic (selection)"],
    ["Ctrl/Cmd Shift X", "strikethrough (selection)"],
    ["Ctrl/Cmd D", "duplicate block"],
    ["Ctrl/Cmd Enter", "check / uncheck to-do"],
    ["Ctrl/Cmd Alt 0-3", "paragraph / heading 1-3"],
    ["Alt ↑ / ↓", "move block up / down"],
    ["Tab / Shift Tab", "indent / outdent list item"],
    ["↑ / ↓ at block edge", "jump between blocks"],
    ["/", "block menu (start of a line)"],
    ["[[", "link to another note"],
    ["# ## ### - 1. > ```", "type + space to convert block"],
    ["i / d / o", "insert · draw · new note (when not typing)"],
    ["Esc", "back to normal mode"],
    ["?", "this help"],
  ];
  const scrim = $("#modalScrim");
  scrim.innerHTML =
    '<div class="modal wide"><h2 style="color:var(--blue)">keyboard shortcuts</h2>' +
    rows.map((r) => '<div class="sc-row"><kbd>' + esc(r[0]) + "</kbd><span>" + esc(r[1]) + "</span></div>").join("") +
    '<div class="row2"><button class="cancel" id="scClose">close</button></div></div>';
  scrim.hidden = false;
  $("#scClose").onclick = closeModal;
  scrim.onclick = (e) => { if (e.target === scrim) closeModal(); };
}

// clicking straight into any block should start typing there, not require pressing "i" first —
// focusin bubbles, so one delegated listener covers every block type (heading/paragraph/list/
// todo/quote/table-cell/toggle) without touching each one's own render function
document.addEventListener("focusin", (e) => {
  const blockHost = $("#blockEditor");
  if (!blockHost || !blockHost.contains(e.target)) return;
  // remember which block has focus — the keyboard bar acts on it even after its buttons
  // briefly steal the tap (see currentBlock())
  const wrap = e.target.closest("[data-id]");
  if (wrap) curBlockId = wrap.dataset.id;
  if (mode !== "insert" && mode !== "draw") {
    mode = "insert";
    renderBar(); renderStatus();
  }
});

// tapping the empty space below the last block: if the last block already has content, start a
// fresh paragraph there (what Notion does); if it's empty, just put the caret in it. Either way
// the bottom of the page is real writing space, not a dead zone.
document.addEventListener("click", (e) => {
  if (mode === "draw" || !blocks.length) return;
  if (e.target.id !== "blockEditor" && e.target.id !== "noteSurface") return;
  const last = blocks[blocks.length - 1];
  const lastEmpty = TEXT_TYPES.has(last.type) && !(last.text || "").trim();
  if (lastEmpty) { focusBlock(last.id); return; }
  const nb = { id: uid(), type: "p", text: "" };
  blocks.push(nb);
  syncBody(); renderEditorBlocks(); focusBlock(nb.id, 0);
});

$("#scrim").addEventListener("click", closeSidebar);

// register the service worker — this is what makes the app installable and fast on repeat visits
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js").catch(() => {});
}

/* periodically pick up notes added from Obsidian / sync (sidebar only) */
setInterval(() => { if (!document.hidden) loadList(); }, 15000);

/* when offline, poll every 3s to detect when server comes back */
setInterval(() => { if (!document.hidden && !online) loadList(); }, 3000);

/* live sync — poll active note every 2s and update the editor if another device changed it */
async function pollActiveNote() {
  if (!active || document.hidden || !online) return;
  if (Date.now() - lastTyped < 2000) return; // user is typing right now, skip to avoid clobbering
  const polledId = active.id; // captured before the await — active can change while this is in flight
  try {
    const fresh = await api("GET", "/api/notes/" + encodeURIComponent(polledId));
    // the user can navigate to a different note (e.g. click a [[link]]) while this request is
    // still in flight — without this check, a slow/stale response for the OLD note would land
    // after the switch and silently overwrite the NEW note's displayed content with the old
    // note's body. If the user then types anything, that gets autosaved — actually corrupting
    // the new note's file with the old note's content. Same guard loadBacklinks() already has.
    if (!active || active.id !== polledId) return;
    if (fresh.updated <= (active.updated || 0)) return; // nothing new
    active.updated = fresh.updated;
    active.title = fresh.title;
    if (mode === "draw" && !$("#noteScroll")) {
      // legacy draw view: only strokes are on screen
      active.strokes = fresh.strokes || [];
      redraw();
    } else {
      // unified surface shows ink at all times — pull stroke changes from other devices live
      // (length compare is a cheap change detector: draw, undo and clear all change it)
      if ((fresh.strokes || []).length !== (active.strokes || []).length) {
        active.strokes = fresh.strokes || [];
        if ($("#cv")) redraw();
      }
      // update editor if body changed
      if (fresh.body !== active.body) {
        active.body = fresh.body;
        const ed = $("#ed");
        const blockHost = $("#blockEditor");
        if (ed && document.activeElement !== ed) {
          // only overwrite when user isn't focused in the textarea
          ed.value = fresh.body;
        } else if (ed) {
          // user has the textarea focused — update without losing cursor position
          const start = ed.selectionStart, end = ed.selectionEnd;
          ed.value = fresh.body;
          ed.selectionStart = Math.min(start, fresh.body.length);
          ed.selectionEnd = Math.min(end, fresh.body.length);
        } else if (blockHost) {
          // block editor: a full re-render replaces every block's DOM node, so only do it
          // when nothing inside is focused — otherwise just let the next poll pick it up
          if (!blockHost.contains(document.activeElement)) {
            blocks = parseBlocks(fresh.body);
            renderEditorBlocks();
          }
        }
      }
    }
    renderStatus();
  } catch (e) {}
}
setInterval(pollActiveNote, 2000);

/* ---- boot ---- */
(async () => {
  // server already redirects "/" to "/login" for anonymous requests, so this
  // should always succeed — but if a session expires between page load and
  // this fetch, bounce to login rather than rendering a broken bar.
  try {
    const res = await fetch("/api/me");
    if (!res.ok) { window.location.href = "/login"; return; }
    ME = (await res.json()).username;
  } catch (e) { window.location.href = "/login"; return; }

  // show cached list immediately so app feels instant — server fetch updates it in loadList()
  const cachedList = lcLoadList();
  if (cachedList.length) { notes = cachedList; renderList(); }
  renderBar(); renderStatus();
  await loadList(); // fetch from server (updates cache on success, sets offline flag on failure)
  // reopen the note you were last in (persisted per account in openNote), or first in list —
  // fall back to local cache if server is down
  const lastId = LC.get("glyph:" + ME + ":last");
  const firstId = activeId ||
    (lastId && notes.some((n) => n.id === lastId) ? lastId : (notes[0] && notes[0].id));
  if (firstId) {
    try { await openNote(firstId); }
    catch(e) { renderMain(); } // cached note not available either
  } else renderMain();
})();
</script>
</body>
</html>
